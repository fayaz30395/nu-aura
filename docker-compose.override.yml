# Development overrides — hot reload, debug ports, volume mounts
services:
  backend:
    build:
      target: development
    ports:
      - "8080:8080"
      - "5005:5005"    # JVM remote debug port
    volumes:
      - ./backend/src:/app/backend/src:cached
      - ./backend/target:/app/backend/target:cached
      - ./modules/common/src:/app/modules/common/src:cached
      - ./modules/pm/src:/app/modules/pm/src:cached
    environment:
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      LOGGING_LEVEL_COM_HRMS: DEBUG

  frontend:
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
