version: '3.9'

# NU-AURA HRMS — Production Docker Compose
# Usage: docker-compose -f docker-compose.prod.yml up -d
# Prerequisites: copy .env.production.example to .env and fill in all REQUIRED values

services:
  postgres:
    image: postgres:16-alpine
    container_name: hrms-postgres
    restart: always
    environment:
      POSTGRES_DB: hrms
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME} -d hrms"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hrms_network
    # Do NOT expose 5432 externally in production

  redis:
    image: redis:7-alpine
    container_name: hrms-redis
    restart: always
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${SPRING_REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hrms_network
    # Do NOT expose 6379 externally in production

  minio:
    image: minio/minio:latest
    container_name: hrms-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - hrms_network
    # Do NOT expose 9000/9001 externally unless behind a reverse proxy with auth

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms-backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hrms
      SPRING_REDIS_HOST: redis
      MINIO_ENDPOINT: http://minio:9000
    networks:
      - hrms_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hrms-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      NEXT_PUBLIC_DEMO_MODE: "false"
    networks:
      - hrms_network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  hrms_network:
    driver: bridge
