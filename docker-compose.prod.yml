version: '3.9'

# NU-AURA HRMS — Production Docker Compose
# Usage: docker-compose -f docker-compose.prod.yml up -d
# Prerequisites: copy .env.production.example to .env and fill in all REQUIRED values

services:
  postgres:
    image: postgres:16-alpine
    container_name: hrms-postgres
    restart: always
    environment:
      POSTGRES_DB: hrms
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME} -d hrms" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hrms_network
    # Do NOT expose 5432 externally in production

  redis:
    image: redis:7-alpine
    container_name: hrms-redis
    restart: always
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${SPRING_REDIS_PASSWORD:-}
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hrms_network
    # Do NOT expose 6379 externally in production

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: hrms-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?ELASTIC_PASSWORD must be set in .env}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -f -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - hrms_network
    # Do NOT expose 9200 externally in production

  # MinIO removed — production uses Google Drive for file storage.
  # Google Drive credentials are mounted as a secret volume.

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hrms-backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hrms
      SPRING_REDIS_HOST: redis
      # Google Drive storage configuration
      STORAGE_PROVIDER: google-drive
      GOOGLE_DRIVE_CREDENTIALS_PATH: /etc/secrets/google-drive/credentials.json
      GOOGLE_DRIVE_ROOT_FOLDER_ID: ${GOOGLE_DRIVE_ROOT_FOLDER_ID:?GOOGLE_DRIVE_ROOT_FOLDER_ID must be set in .env}
    volumes:
      - ${GOOGLE_DRIVE_CREDENTIALS_FILE:?GOOGLE_DRIVE_CREDENTIALS_FILE must be set in .env}:/etc/secrets/google-drive/credentials.json:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - hrms_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hrms-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      NEXT_PUBLIC_DEMO_MODE: "false"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - hrms_network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

networks:
  hrms_network:
    driver: bridge
