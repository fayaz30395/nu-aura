# Development profile configuration
# IMPORTANT: All sensitive values should be provided via environment variables
# Never commit actual credentials to version control

spring:
  datasource:
    # Use environment variables for database credentials
    url: ${DEV_DATABASE_URL:jdbc:postgresql://localhost:5432/hrms_dev}
    username: ${DEV_DATABASE_USERNAME:hrms_user}
    password: ${DEV_DATABASE_PASSWORD:hrms_pass}

  data:
    redis:
      host: ${DEV_REDIS_HOST:localhost}
      port: ${DEV_REDIS_PORT:6379}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    # IMPORTANT: Set JWT_SECRET environment variable in production
    secret: ${JWT_SECRET:dev-only-secret-change-in-production-must-be-at-least-256-bits-long}
    expiration: 3600000
    refresh-expiration: 86400000

  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:hrms-files}

  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}

logging:
  level:
    com.hrms: DEBUG
    org.springframework.security: DEBUG