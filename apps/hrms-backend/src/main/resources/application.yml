server:
  port: 8080

spring:
  application:
    name: hrms-backend
  datasource:
    url: ${HRMS_DB_URL:jdbc:postgresql://localhost:5432/hrms}
    username: ${HRMS_DB_USERNAME:hrms}
    password: ${HRMS_DB_PASSWORD:hrms}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${HRMS_DB_SCHEMA:hrms}
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: ${HRMS_DB_SCHEMA:hrms}
    create-schemas: true
    baseline-on-migrate: ${HRMS_FLYWAY_BASELINE_ON_MIGRATE:false}
  redis:
    host: ${HRMS_REDIS_HOST:localhost}
    port: ${HRMS_REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info

hrms:
  org:
    id: ${HRMS_ORG_ID:00000000-0000-0000-0000-000000000001}
    name: ${HRMS_ORG_NAME:NuLogic}
    domain: ${HRMS_ORG_DOMAIN:nulogic.io}
  security:
    cors-allowed-origins: ${HRMS_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3007}
    jwt:
      issuer: ${HRMS_JWT_ISSUER:hrms}
      secret: ${HRMS_JWT_SECRET:change-me}
      access-ttl-minutes: ${HRMS_JWT_ACCESS_TTL_MINUTES:15}
      refresh-ttl-days: ${HRMS_JWT_REFRESH_TTL_DAYS:7}
  google:
    allowed-domain: ${HRMS_GOOGLE_ALLOWED_DOMAIN:nulogic.io}
    client-ids: ${HRMS_GOOGLE_CLIENT_IDS:}
    delegated-user: ${HRMS_GOOGLE_DELEGATED_USER:fayaz.m@nulogic.io}
    service-account-json: ${HRMS_GOOGLE_SERVICE_ACCOUNT_JSON:}
    shared-drive-id: ${HRMS_GOOGLE_SHARED_DRIVE_ID:}
  bootstrap:
    super-admin-email: ${HRMS_BOOTSTRAP_SUPER_ADMIN_EMAIL:}
  attendance:
    regularization-window-days: ${HRMS_ATT_REG_WINDOW_DAYS:7}
    timezone: ${HRMS_ATT_TIMEZONE:UTC}
