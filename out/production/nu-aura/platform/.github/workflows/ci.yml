name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '18'

jobs:
  # Backend Build & Test
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: hrms_test
          POSTGRES_USER: hrms
          POSTGRES_PASSWORD: hrms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build parent POM
        working-directory: ./
        run: mvn install -N -DskipTests

      - name: Build common module
        working-directory: ./modules/common
        run: mvn clean install -DskipTests

      - name: Build PM module
        working-directory: ./modules/pm
        run: mvn clean install -DskipTests

      - name: Build HRMS Backend
        working-directory: ./hrms-backend
        run: mvn clean compile -DskipTests

      - name: Run Backend Tests
        working-directory: ./hrms-backend
        run: mvn test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/hrms_test
          SPRING_DATASOURCE_USERNAME: hrms
          SPRING_DATASOURCE_PASSWORD: hrms_test

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: backend-test-results
          path: hrms-backend/target/surefire-reports/

  # Frontend Build & Test
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: hrms-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./hrms-frontend
        run: npm ci

      - name: Run ESLint
        working-directory: ./hrms-frontend
        run: npm run lint || true  # Don't fail on lint warnings initially

      - name: TypeScript check
        working-directory: ./hrms-frontend
        run: npx tsc --noEmit || true  # Type check without emitting

      - name: Build Frontend
        working-directory: ./hrms-frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  # PM Frontend Build (if exists)
  pm-frontend:
    name: PM Frontend (Next.js)
    runs-on: ubuntu-latest
    if: ${{ hashFiles('pm-frontend/package.json') != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: pm-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./pm-frontend
        run: npm ci

      - name: Build PM Frontend
        working-directory: ./pm-frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  # Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Docker Build (optional)
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./hrms-backend
          file: ./hrms-backend/Dockerfile
          push: false
          tags: nulogic/hrms-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./hrms-frontend
          file: ./hrms-frontend/Dockerfile
          push: false
          tags: nulogic/hrms-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
