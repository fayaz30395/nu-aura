# Prometheus Configuration for HRMS Application
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'hrms-platform'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "/etc/prometheus/rules/*.yml"

# Scrape configurations
scrape_configs:
  # HRMS Backend Application
  - job_name: 'hrms-backend'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['hrms-backend:8080']
        labels:
          application: 'hrms-backend'
          environment: 'production'

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # PostgreSQL Exporter (if enabled)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          database: 'hrms'

  # Redis Exporter (if enabled)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          cache: 'redis'

  # Node Exporter for system metrics (if enabled)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
