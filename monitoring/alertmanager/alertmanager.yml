# AlertManager Configuration for HRMS
global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@hrms.com'
  smtp_auth_username: '${SMTP_USERNAME}'
  smtp_auth_password: '${SMTP_PASSWORD}'

# Templates for alert notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route tree for alert notifications
route:
  receiver: 'default-receiver'
  group_by: [ 'alertname', 'cluster', 'service' ]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h

  routes:
    # Critical alerts go to multiple channels
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true

    # Warning alerts
    - match:
        severity: warning
      receiver: 'warning-alerts'

    # Info alerts
    - match:
        severity: info
      receiver: 'info-alerts'

# Receivers configuration
receivers:
  - name: 'default-receiver'
    email_configs:
      - to: 'ops-team@hrms.com'
        headers:
          Subject: 'HRMS Alert: {{ .GroupLabels.alertname }}'
        html: |
          <h3>Alert: {{ .GroupLabels.alertname }}</h3>
          <p><b>Severity:</b> {{ .CommonLabels.severity }}</p>
          <p><b>Summary:</b> {{ .CommonAnnotations.summary }}</p>
          <p><b>Description:</b> {{ .CommonAnnotations.description }}</p>
          <p><b>Time:</b> {{ .StartsAt.Format "2006-01-02 15:04:05" }}</p>

  - name: 'critical-alerts'
    email_configs:
      - to: 'critical-alerts@hrms.com,cto@hrms.com'
        headers:
          Subject: 'CRITICAL HRMS Alert: {{ .GroupLabels.alertname }}'
        send_resolved: true
    # Webhook for integration with Slack/Teams/PagerDuty
    webhook_configs:
      - url: 'http://webhook-service:8080/alerts/critical'
        send_resolved: true

  - name: 'warning-alerts'
    email_configs:
      - to: 'dev-team@hrms.com'
        headers:
          Subject: 'WARNING HRMS Alert: {{ .GroupLabels.alertname }}'
        send_resolved: true

  - name: 'info-alerts'
    email_configs:
      - to: 'monitoring@hrms.com'
        headers:
          Subject: 'INFO HRMS Alert: {{ .GroupLabels.alertname }}'
        send_resolved: true

# Inhibition rules to prevent alert spam
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: [ 'alertname', 'cluster', 'service' ]
