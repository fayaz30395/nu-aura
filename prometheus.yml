global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'hrms-platform'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # HRMS Backend metrics
  - job_name: 'hrms-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']
    scrape_interval: 10s
    scrape_timeout: 5s
