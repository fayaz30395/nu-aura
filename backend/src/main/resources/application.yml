spring:
  application:
    name: hrms-platform

  main:
    allow-bean-definition-overriding: true

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hrms}
    username: ${SPRING_DATASOURCE_USERNAME:hrms}
    password: ${SPRING_DATASOURCE_PASSWORD:hrms_dev_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 25
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # Performance optimizations
      leak-detection-threshold: 60000
      pool-name: HrmsHikariPool
      # Validate connections before use
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
        tenant_identifier_resolver: com.hrms.common.config.TenantIdentifierResolver
        # Slow query logging - log queries taking longer than threshold
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: ${SLOW_QUERY_THRESHOLD_MS:200}
        # Generate Hibernate statistics for monitoring
        generate_statistics: ${HIBERNATE_STATS_ENABLED:false}
        # Batch fetching configuration to prevent N+1 queries
        default_batch_fetch_size: 25
        # JDBC batch processing for inserts/updates
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        # Query plan cache
        query:
          plan_cache_max_size: 2048
          plan_parameter_metadata_max_size: 256
    open-in-view: false

  flyway:
    enabled: false
    locations: classpath:db/migration
    default-schema: public
    baseline-on-migrate: true
    out-of-order: true
    validate-on-migrate: false
    clean-disabled: false

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 2000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    from: ${MAIL_FROM:noreply@hrms.com}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000

# Twilio SMS Configuration
# Set mock-mode to false and provide credentials to send real SMS
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  from-number: ${TWILIO_FROM_NUMBER:}
  mock-mode: ${TWILIO_MOCK_MODE:true}
  messaging-service-sid: ${TWILIO_MESSAGING_SERVICE_SID:}
  max-message-length: 1600
  status-callback-enabled: false
  status-callback-url: ${TWILIO_STATUS_CALLBACK_URL:}

# Job Board Integration Configuration
# Set credentials via K8s secrets to enable live posting to each board
integration:
  naukri:
    api-url: ${NAUKRI_API_URL:https://www.naukri.com/api/v2}
    client-id: ${NAUKRI_CLIENT_ID:}
    client-secret: ${NAUKRI_CLIENT_SECRET:}
  indeed:
    api-url: ${INDEED_API_URL:https://apis.indeed.com/graphql}
    access-token: ${INDEED_ACCESS_TOKEN:}
    employer-id: ${INDEED_EMPLOYER_ID:}
  linkedin:
    api-url: ${LINKEDIN_API_URL:https://api.linkedin.com/v2}
    access-token: ${LINKEDIN_ACCESS_TOKEN:}
    organization-id: ${LINKEDIN_ORGANIZATION_ID:}

# Calendar Integration Configuration
# Set mock-mode to false and provide OAuth credentials for real sync
calendar:
  sync:
    mock-mode: ${CALENDAR_MOCK_MODE:true}
  google:
    client-id: ${GOOGLE_CALENDAR_CLIENT_ID:}
    client-secret: ${GOOGLE_CALENDAR_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_CALENDAR_REDIRECT_URI:}
  outlook:
    client-id: ${OUTLOOK_CALENDAR_CLIENT_ID:}
    client-secret: ${OUTLOOK_CALENDAR_CLIENT_SECRET:}
    tenant-id: ${OUTLOOK_TENANT_ID:}
    redirect-uri: ${OUTLOOK_CALENDAR_REDIRECT_URI:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: false
      validate-group-membership: false
      group:
        liveness:
          include: ping
        readiness:
          include: ping
    prometheus:
      enabled: false
  health:
    db:
      enabled: false
    redis:
      enabled: false
    diskSpace:
      enabled: false
      threshold: 1GB
  metrics:
    export:
      prometheus:
        enabled: false
    tags:
      application: ${spring.application.name}
      region: ${METRICS_REGION:default}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slos:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s

server:
  port: ${PORT:8080}
  address: 0.0.0.0
  error:
    # Suppressed in prod profile; exposed in dev for easier debugging
    include-message: ${SERVER_ERROR_INCLUDE_MESSAGE:never}
    include-binding-errors: ${SERVER_ERROR_INCLUDE_BINDING:never}
    include-stacktrace: never
    include-exception: false

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:3600000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:86400000}

  # Cookie configuration for JWT storage
  cookie:
    # Use secure cookies (HTTPS only) - should be true in production
    secure: ${COOKIE_SECURE:true}
    # Optional: restrict cookies to specific domain
    domain: ${COOKIE_DOMAIN:}

  # Security settings
  security:
    csrf:
      # Enable CSRF protection (recommended for cookie-based auth)
      enabled: ${CSRF_ENABLED:true}

  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}

  features:
    MATRIX_RBAC: true
    USER_MANAGEMENT: true
    ORGANIZATION: true
    RECRUITMENT: true
    PAYROLL: true
    EXPENSE_MANAGEMENT: true
    ASSET_MANAGEMENT: true
    PERFORMANCE_REVIEWS: true
    TRAINING_LMS: true
    SOCIAL_FEED: true
    PSA: true
    STATUTORY: true
    LEAVE_MANAGEMENT: true
    ATTENDANCE: true
    ONBOARDING_OFFBOARDING: true
    HELPDESK: true
    WELLNESS: true
    TRAVEL: true
    CALENDAR: true

  tenant:
    resolution-strategy: ${TENANT_RESOLUTION_STRATEGY:header}
    header-name: X-Tenant-ID

  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}

  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:}
    secret-key: ${MINIO_SECRET_KEY:}
    bucket: ${MINIO_BUCKET:hrms-files}

  slack:
    enabled: ${SLACK_ENABLED:false}
    webhook-url: ${SLACK_WEBHOOK_URL:}
    bot-token: ${SLACK_BOT_TOKEN:}
    default-channel: ${SLACK_DEFAULT_CHANNEL:#hrms-notifications}

  auth:
    allowed-domain: ${AUTH_ALLOWED_DOMAIN:nulogic.io}

  # API Rate Limiting Configuration (Bucket4j Token Bucket Algorithm)
  rate-limit:
    enabled: false
    requests-per-minute: 600
    # Authentication endpoints (login, register, etc.)
    auth:
      capacity: ${RATE_LIMIT_AUTH_CAPACITY:10}              # Max 10 requests
      refill-tokens: ${RATE_LIMIT_AUTH_REFILL:10}           # Refill 10 tokens
      refill-minutes: ${RATE_LIMIT_AUTH_REFILL_MIN:1}       # Every 1 minute
    # General API endpoints (CRUD operations, queries)
    api:
      capacity: ${RATE_LIMIT_API_CAPACITY:100}              # Max 100 requests
      refill-tokens: ${RATE_LIMIT_API_REFILL:100}           # Refill 100 tokens
      refill-minutes: ${RATE_LIMIT_API_REFILL_MIN:1}        # Every 1 minute
    # Export/reporting endpoints (resource-intensive)
    export:
      capacity: ${RATE_LIMIT_EXPORT_CAPACITY:5}             # Max 5 requests
      refill-tokens: ${RATE_LIMIT_EXPORT_REFILL:5}          # Refill 5 tokens
      refill-minutes: ${RATE_LIMIT_EXPORT_REFILL_MIN:5}     # Every 5 minutes
    # Wall/Social feed endpoints (comment, post, react)
    wall:
      capacity: ${RATE_LIMIT_WALL_CAPACITY:30}              # Max 30 requests
      refill-tokens: ${RATE_LIMIT_WALL_REFILL:30}           # Refill 30 tokens
      refill-minutes: ${RATE_LIMIT_WALL_REFILL_MIN:1}       # Every 1 minute

  # Pagination Configuration
  pagination:
    # Maximum page size for any paginated endpoint
    max-page-size: ${PAGINATION_MAX_SIZE:100}
    # Default page size if not specified
    default-page-size: ${PAGINATION_DEFAULT_SIZE:20}
    # Maximum page size for wall comments
    wall-comments-max-size: ${PAGINATION_WALL_COMMENTS_MAX:50}
    # Maximum page size for wall posts
    wall-posts-max-size: ${PAGINATION_WALL_POSTS_MAX:50}

# AI Configuration for recruitment features
ai:
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model: ${OPENAI_MODEL:gpt-4o-mini}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: true

logging:
  level:
    root: INFO
    com.hrms: INFO
    org.springframework.security: INFO
    # Suppress SQL/param logs by default; dev profile re-enables them
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.hibernate.orm.jdbc.bind: WARN

---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # Enable statistics in dev for performance monitoring
        generate_statistics: true

# Dev profile: disable secure cookies (localhost doesn't have HTTPS)
app:
  cookie:
    secure: false
  security:
    csrf:
      enabled: false

server:
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.hrms: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    # Log Hibernate statistics for N+1 query detection
    org.hibernate.stat: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 600000

  jpa:
    show-sql: false

  # Redis is required in production for AccountLockoutService (distributed lockout)
  # and application-level caching. Ensure SPRING_REDIS_HOST/PORT/PASSWORD are set.
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      ssl:
        enabled: ${SPRING_REDIS_SSL_ENABLED:false}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false

logging:
  level:
    root: INFO
    com.hrms: INFO
    org.springframework.security: INFO
    # Silence SQL and parameter-binding logs in production to prevent PII leakage
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.hibernate.orm.jdbc.bind: WARN
