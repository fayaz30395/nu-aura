spring:
  application:
    name: hrms-platform

  main:
    allow-bean-definition-overriding: true

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hrms}
    username: ${SPRING_DATASOURCE_USERNAME:hrms_user}
    password: ${SPRING_DATASOURCE_PASSWORD:hrms_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
        tenant_identifier_resolver: com.hrms.common.config.TenantIdentifierResolver
    open-in-view: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: public

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 2000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    from: ${MAIL_FROM:noreply@hrms.com}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000

# Twilio SMS Configuration
# Set mock-mode to false and provide credentials to send real SMS
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  from-number: ${TWILIO_FROM_NUMBER:}
  mock-mode: ${TWILIO_MOCK_MODE:true}
  messaging-service-sid: ${TWILIO_MESSAGING_SERVICE_SID:}
  max-message-length: 1600
  status-callback-enabled: false
  status-callback-url: ${TWILIO_STATUS_CALLBACK_URL:}

# Calendar Integration Configuration
# Set mock-mode to false and provide OAuth credentials for real sync
calendar:
  sync:
    mock-mode: ${CALENDAR_MOCK_MODE:true}
  google:
    client-id: ${GOOGLE_CALENDAR_CLIENT_ID:}
    client-secret: ${GOOGLE_CALENDAR_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_CALENDAR_REDIRECT_URI:}
  outlook:
    client-id: ${OUTLOOK_CALENDAR_CLIENT_ID:}
    client-secret: ${OUTLOOK_CALENDAR_CLIENT_SECRET:}
    tenant-id: ${OUTLOOK_TENANT_ID:}
    redirect-uri: ${OUTLOOK_CALENDAR_REDIRECT_URI:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    prometheus:
      enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

server:
  port: ${PORT:8080}
  address: 0.0.0.0
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

app:
  jwt:
    secret: ${JWT_SECRET:}
    expiration: ${JWT_EXPIRATION:3600000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:86400000}

  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}

  features:
    MATRIX_RBAC: true
    RECRUITMENT: false
    PAYROLL: true
    EXPENSE_MANAGEMENT: true
    ASSET_MANAGEMENT: true
    PERFORMANCE_REVIEWS: true
    TRAINING_LMS: false
    SOCIAL_FEED: false

  tenant:
    resolution-strategy: ${TENANT_RESOLUTION_STRATEGY:header}
    header-name: X-Tenant-ID

  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}

  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:}
    secret-key: ${MINIO_SECRET_KEY:}
    bucket: ${MINIO_BUCKET:hrms-files}

  slack:
    enabled: ${SLACK_ENABLED:false}
    webhook-url: ${SLACK_WEBHOOK_URL:}
    bot-token: ${SLACK_BOT_TOKEN:}
    default-channel: ${SLACK_DEFAULT_CHANNEL:#hrms-notifications}

  auth:
    allowed-domain: ${AUTH_ALLOWED_DOMAIN:nulogic.io}

  # API Rate Limiting Configuration (Bucket4j Token Bucket Algorithm)
  rate-limit:
    # Authentication endpoints (login, register, etc.)
    auth:
      capacity: ${RATE_LIMIT_AUTH_CAPACITY:10}              # Max 10 requests
      refill-tokens: ${RATE_LIMIT_AUTH_REFILL:10}           # Refill 10 tokens
      refill-minutes: ${RATE_LIMIT_AUTH_REFILL_MIN:1}       # Every 1 minute
    # General API endpoints (CRUD operations, queries)
    api:
      capacity: ${RATE_LIMIT_API_CAPACITY:100}              # Max 100 requests
      refill-tokens: ${RATE_LIMIT_API_REFILL:100}           # Refill 100 tokens
      refill-minutes: ${RATE_LIMIT_API_REFILL_MIN:1}        # Every 1 minute
    # Export/reporting endpoints (resource-intensive)
    export:
      capacity: ${RATE_LIMIT_EXPORT_CAPACITY:5}             # Max 5 requests
      refill-tokens: ${RATE_LIMIT_EXPORT_REFILL:5}          # Refill 5 tokens
      refill-minutes: ${RATE_LIMIT_EXPORT_REFILL_MIN:5}     # Every 5 minutes
    # Wall/Social feed endpoints (comment, post, react)
    wall:
      capacity: ${RATE_LIMIT_WALL_CAPACITY:30}              # Max 30 requests
      refill-tokens: ${RATE_LIMIT_WALL_REFILL:30}           # Refill 30 tokens
      refill-minutes: ${RATE_LIMIT_WALL_REFILL_MIN:1}       # Every 1 minute

  # Pagination Configuration
  pagination:
    # Maximum page size for any paginated endpoint
    max-page-size: ${PAGINATION_MAX_SIZE:100}
    # Default page size if not specified
    default-page-size: ${PAGINATION_DEFAULT_SIZE:20}
    # Maximum page size for wall comments
    wall-comments-max-size: ${PAGINATION_WALL_COMMENTS_MAX:50}
    # Maximum page size for wall posts
    wall-posts-max-size: ${PAGINATION_WALL_POSTS_MAX:50}

# AI Configuration for recruitment features
ai:
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model: ${OPENAI_MODEL:gpt-4o-mini}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: true

logging:
  level:
    root: INFO
    com.hrms: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.hrms: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 600000

  jpa:
    show-sql: false

  cache:
    type: simple

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

management:
  health:
    redis:
      enabled: false

logging:
  level:
    root: INFO
    com.hrms: INFO
    org.springframework.security: INFO
