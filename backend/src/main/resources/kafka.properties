# ============================================================
# Kafka Configuration Properties for NU-AURA HRMS Platform
# ============================================================
# Kafka Bootstrap Servers (overridden by SPRING_KAFKA_BOOTSTRAP_SERVERS env var)
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
# ============ PRODUCER CONFIGURATION ============
spring.kafka.producer.acks=${SPRING_KAFKA_PRODUCER_ACKS:all}
spring.kafka.producer.retries=${SPRING_KAFKA_PRODUCER_RETRIES:3}
spring.kafka.producer.batch-size=${SPRING_KAFKA_PRODUCER_BATCH_SIZE:16384}
spring.kafka.producer.linger-ms=${SPRING_KAFKA_PRODUCER_LINGER_MS:10}
# Enable idempotent producer for exactly-once delivery
spring.kafka.producer.properties.enable.idempotence=true
# Compression for bandwidth optimization
spring.kafka.producer.compression-type=snappy
# ============ CONSUMER CONFIGURATION ============
spring.kafka.consumer.auto-offset-reset=${SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.max-poll-records=${SPRING_KAFKA_CONSUMER_MAX_POLL_RECORDS:100}
spring.kafka.consumer.session-timeout-ms=${SPRING_KAFKA_CONSUMER_SESSION_TIMEOUT_MS:30000}
spring.kafka.consumer.heartbeat-interval-ms=${SPRING_KAFKA_CONSUMER_HEARTBEAT_INTERVAL_MS:10000}
# Manual commit for critical services (configured in KafkaConfig)
spring.kafka.consumer.enable-auto-commit=false
# ============ LISTENER CONFIGURATION ============
# Concurrency for consumer groups (threads per partition)
spring.kafka.listener.concurrency=3
# Type of acknowledgment (MANUAL, MANUAL_IMMEDIATE, or AUTO)
spring.kafka.listener.ack-mode=manual
# ============ TOPIC CONFIGURATION ============
# Topics are created programmatically via KafkaConfig.java NewTopic beans
# Default partition count for topics
kafka.topic.default.partitions=3
kafka.topic.default.replication-factor=1
# Specific partition counts by domain
kafka.topic.approvals.partitions=3
kafka.topic.notifications.partitions=5
kafka.topic.audit.partitions=10
kafka.topic.employee-lifecycle.partitions=2
# Message retention periods (milliseconds)
kafka.retention.approvals.ms=86400000
kafka.retention.notifications.ms=86400000
kafka.retention.audit.ms=2592000000
kafka.retention.employee-lifecycle.ms=86400000
kafka.retention.dlt.ms=604800000
# ============ MONITORING ============
# Enable Kafka metrics collection
management.metrics.export.kafka.enabled=true
# ============ LOGGING ============
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=INFO
logging.level.com.hrms.infrastructure.kafka=DEBUG
