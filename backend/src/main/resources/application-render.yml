# Render.com cloud deployment profile
# Activated via SPRING_PROFILES_ACTIVE=render on Render.com free plan
spring:
  config:
    activate:
      on-profile: render

  main:
    lazy-initialization: true

  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      timeout: 2000

  # Use simple in-memory cache — no Redis needed on Render free plan
  cache:
    type: simple

  flyway:
    enabled: true
    clean-disabled: true
    # Relaxed validation to avoid checksum failures on existing DB
    validate-on-migrate: false
    out-of-order: true
    baseline-on-migrate: true
    baseline-version: 18
    locations: classpath:db/migration

  # Disable Kafka auto-configuration startup connection attempts
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      auto-startup: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      validate-group-membership: false
      group:
        liveness:
          include: ping,diskSpace
        readiness:
          include: ping,db
  health:
    redis:
      enabled: false
    kafka:
      enabled: false
    elasticsearch:
      enabled: false

server:
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: false
    include-exception: false
  # Increase startup timeout headroom
  tomcat:
    connection-timeout: 20000

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 3600000
    refresh-expiration: 86400000

  cookie:
    secure: true

  security:
    csrf:
      enabled: true

  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://hrms-frontend-vert.vercel.app}

  google-drive:
    credentials-path: ${GOOGLE_DRIVE_CREDENTIALS_PATH:/etc/secrets/google-drive/credentials.json}
    root-folder-id: ${GOOGLE_DRIVE_ROOT_FOLDER_ID:}
    application-name: NU-AURA-HRMS

  rate-limit:
    enabled: true
    requests-per-minute: 60

  frontend:
    url: ${FRONTEND_URL:https://hrms-frontend-vert.vercel.app}

logging:
  level:
    root: INFO
    com.hrms: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
    org.springframework.boot.autoconfigure: WARN
