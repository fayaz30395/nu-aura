# Render.com cloud deployment profile
# Activated via SPRING_PROFILES_ACTIVE=render on Render.com free plan
spring:
  config:
    activate:
      on-profile: render

  main:
    lazy-initialization: true
    # Exclude Redis and Elasticsearch auto-configuration on Render — reduces startup
    # time from 90+ seconds to under 30. Direct Redis bean usage is preserved.
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    admin:
      # Do not fail-fast if Kafka is unavailable — allows app to start without Kafka
      fail-fast: false
    producer:
      bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      auto-startup: false

  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 600000

  jpa:
    hibernate:
      # none: skip schema validation (Flyway is disabled, schema is pre-migrated)
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false
        # Explicitly set dialect so Hibernate doesn't need a DB connection at startup
        # to auto-detect it. Without this, Hibernate 6.x throws
        # "Unable to determine Dialect without JDBC metadata" if the Neon DB
        # connection is slow or times out during bean initialization.
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      timeout: 2000
      repositories:
        # CRITICAL: disable Redis repository scanning — Spring scans all 274 JPA
        # repos as potential Redis repos, adding 60+ sec to startup and flooding logs.
        # Direct Redis usage (TokenBlacklist, rate-limiter) is unaffected.
        enabled: false

  # Elasticsearch — not provisioned on Render free plan; set short timeouts so
  # FluenceDocumentRepository doesn't block startup for 30+ seconds
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
    connection-timeout: 2s
    socket-timeout: 2s
    # Disable auto-index creation to avoid startup connection requirement
    repositories:
      enabled: false

  # Use simple in-memory cache — no Redis needed on Render free plan
  cache:
    type: simple

  flyway:
    # DB is already migrated — disable Flyway on startup to avoid
    # running 100+ migrations and exceeding health check timeout
    enabled: false


management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      validate-group-membership: false
      group:
        liveness:
          include: ping,diskSpace
        readiness:
          include: ping,db
  health:
    redis:
      enabled: false
    kafka:
      enabled: false
    elasticsearch:
      enabled: false

server:
  # Render injects PORT env var (default 10000); Spring Boot must bind to that port
  port: ${PORT:8080}
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
    include-exception: false

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 3600000
    refresh-expiration: 86400000

  cookie:
    secure: true

  security:
    csrf:
      enabled: true

  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://hrms-frontend-vert.vercel.app}

  google-drive:
    credentials-path: ${GOOGLE_DRIVE_CREDENTIALS_PATH:/etc/secrets/google-drive/credentials.json}
    root-folder-id: ${GOOGLE_DRIVE_ROOT_FOLDER_ID:}
    application-name: NU-AURA-HRMS

  rate-limit:
    enabled: true
    requests-per-minute: 60

  frontend:
    url: ${FRONTEND_URL:https://hrms-frontend-vert.vercel.app}

logging:
  level:
    root: INFO
    com.hrms: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
    org.springframework.boot.autoconfigure: WARN
