# Render.com cloud deployment profile
# Activated via SPRING_PROFILES_ACTIVE=render on Render's free plan
# Uses in-memory caching and disables services not available on free tier
spring:
  config:
    activate:
      on-profile: render

  main:
    lazy-initialization: true

  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false

  # Redis optional on Render free plan — fall back to localhost (will fail gracefully)
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      timeout: 2000
      lettuce:
        pool:
          max-active: 4
          max-idle: 2
          min-idle: 0

  # Use simple in-memory cache when Redis is not available
  cache:
    type: ${SPRING_CACHE_TYPE:simple}

  flyway:
    enabled: true
    clean-disabled: true
    validate-on-migrate: true
    locations: classpath:db/migration,classpath:db/seed

# Health probes — exclude Redis/Kafka from readiness on Render (not provisioned)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      validate-group-membership: false
      group:
        liveness:
          include: ping,diskSpace
        readiness:
          include: ping,db

server:
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: false
    include-exception: false

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 3600000
    refresh-expiration: 86400000

  cookie:
    secure: true

  security:
    csrf:
      enabled: true

  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://hrms-frontend-vert.vercel.app}

  google-drive:
    credentials-path: ${GOOGLE_DRIVE_CREDENTIALS_PATH:/etc/secrets/google-drive/credentials.json}
    root-folder-id: ${GOOGLE_DRIVE_ROOT_FOLDER_ID:}
    application-name: ${GOOGLE_DRIVE_APP_NAME:NU-AURA-HRMS}

  rate-limit:
    enabled: true
    requests-per-minute: 60

  frontend:
    url: ${FRONTEND_URL:https://hrms-frontend-vert.vercel.app}

logging:
  level:
    root: INFO
    com.hrms: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
