<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title th:text="${title}">Company Announcement</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      background: #0891b2;
      color: white;
      padding: 20px;
      text-align: center;
      border-radius: 8px 8px 0 0;
    }

    .content {
      background: #f8fafc;
      padding: 30px;
      border: 1px solid #e2e8f0;
    }

    .announcement-content {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      border: 1px solid #e2e8f0;
    }

    .footer {
      text-align: center;
      padding: 20px;
      color: #64748b;
      font-size: 12px;
    }

    .button {
      display: inline-block;
      background: #0891b2;
      color: white;
      padding: 12px 24px;
      text-decoration: none;
      border-radius: 6px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
<div class="header">
  <h1 th:text="${title}">Company Announcement</h1>
</div>
<div class="content">
  <p>Hello <strong th:text="${employeeName}">Employee</strong>,</p>

  <div class="announcement-content" th:utext="${content}">
    Announcement content goes here...
  </div>

  <a class="button" th:href="${frontendUrl + '/announcements'}">View All Announcements</a>
</div>
<div class="footer">
  <p>This is an automated message from HRMS. Please do not reply to this email.</p>
  <p>&copy; 2025 HRMS Platform. All rights reserved.</p>
</div>
</body>
</html>
