spring:
  config:
    activate:
      on-profile: prod

  datasource:
    hikari:
      # Neon cloud PostgreSQL limits: 100 connections per endpoint (free tier).
      # With N pods, each pod gets max-pool-size connections = N * 20 total.
      # Safe for up to 5 pods; upgrade Neon plan before scaling beyond 5.
      # Use PgBouncer for higher pod counts.
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 600000

  jpa:
    hibernate:
      # CRITICAL: Never auto-modify schema in production
      # Use Flyway for all schema changes
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        # Disable statistics in production for performance
        generate_statistics: false

  flyway:
    enabled: true
    # CRITICAL: Prevent accidental schema destruction in production
    clean-disabled: true
    # Validate migrations on startup
    validate-on-migrate: true

  # Redis is required in production for distributed caching and idempotency
  # SPRING_REDIS_HOST defaults to localhost so the app can start without Redis configured;
  # all Redis components have in-memory fallbacks (TokenBlacklist → ConcurrentHashMap,
  # rate limiter → Bucket4j). Configure a real Redis host (e.g. Upstash) via env var.
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      ssl:
        enabled: ${SPRING_REDIS_SSL_ENABLED:false}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false

# Production health probes configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      # Show details only when authorized (via Spring Security)
      show-details: when-authorized
      probes:
        enabled: true
      # Validate group membership to control access
      validate-group-membership: true
      group:
        # Kubernetes liveness probe
        liveness:
          include: ping,diskSpace
        # Readiness probe — kafka excluded because Render doesn't run Kafka;
        # redis excluded from hard-dependency since fallbacks exist in code.
        # K8s deployments on GKE can override this via env if needed.
        readiness:
          include: ping,db
    prometheus:
      enabled: true
  health:
    db:
      enabled: true
    redis:
      # Redis health reported as info only — code has in-memory fallbacks.
      # Set SPRING_REDIS_HOST env var to a real Redis instance for full caching.
      enabled: true
    # Kafka health disabled on Render (no Kafka broker).
    # Re-enable when deploying to GKE with Confluent Kafka.
    kafka:
      enabled: false
    diskSpace:
      enabled: true
      threshold: 1GB
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      region: ${METRICS_REGION:default}
      environment: production

# Production error handling
server:
  error:
    # CRITICAL: Never expose stack traces in production
    include-stacktrace: never
    include-message: never
    include-binding-errors: false
    include-exception: false

# Production security settings
app:
  cookie:
    # CRITICAL: Always use secure cookies (HTTPS only) in production
    secure: true
  security:
    csrf:
      # Enable CSRF protection in production
      enabled: true

  # Google Drive file storage (production service account)
  google-drive:
    credentials-path: ${GOOGLE_DRIVE_CREDENTIALS_PATH:/etc/secrets/google-drive/credentials.json}
    root-folder-id: ${GOOGLE_DRIVE_ROOT_FOLDER_ID:}
    application-name: ${GOOGLE_DRIVE_APP_NAME:NU-AURA-HRMS}

  # CORS — must be explicitly set via env var in production; no wildcard permitted
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://app.nulogic.io}

  # Rate limiting ON in production to prevent abuse
  rate-limit:
    enabled: true
    requests-per-minute: 60
    auth:
      capacity: ${RATE_LIMIT_AUTH_CAPACITY:10}
      refill-tokens: ${RATE_LIMIT_AUTH_REFILL:10}
      refill-minutes: ${RATE_LIMIT_AUTH_REFILL_MIN:1}
    api:
      capacity: ${RATE_LIMIT_API_CAPACITY:100}
      refill-tokens: ${RATE_LIMIT_API_REFILL:100}
      refill-minutes: ${RATE_LIMIT_API_REFILL_MIN:1}
    export:
      capacity: ${RATE_LIMIT_EXPORT_CAPACITY:5}
      refill-tokens: ${RATE_LIMIT_EXPORT_REFILL:5}
      refill-minutes: ${RATE_LIMIT_EXPORT_REFILL_MIN:5}
    wall:
      capacity: ${RATE_LIMIT_WALL_CAPACITY:30}
      refill-tokens: ${RATE_LIMIT_WALL_REFILL:30}
      refill-minutes: ${RATE_LIMIT_WALL_REFILL_MIN:1}

logging:
  level:
    root: INFO
    com.hrms: INFO
    org.springframework.security: INFO
    # Silence SQL and parameter-binding logs in production to prevent PII leakage
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.hibernate.orm.jdbc.bind: WARN
