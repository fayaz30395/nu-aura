# Development profile configuration
# IMPORTANT: All sensitive values should be provided via environment variables
# Never commit actual credentials to version control

spring:
  config:
    activate:
      on-profile: dev

  main:
    # HIGH-4 FIX: allow-bean-definition-overriding scoped to dev only (removed from base application.yml)
    allow-bean-definition-overriding: true
    lazy-initialization: true

  datasource:
    # Use environment variables for database credentials
    url: ${DEV_DATABASE_URL:jdbc:postgresql://localhost:5432/hrms}
    username: ${DEV_DATABASE_USERNAME:hrms}
    password: ${DEV_DATABASE_PASSWORD}
    hikari:
      # Reduced for local dev — prevents OOM under macOS memory pressure
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 120000
      max-lifetime: 240000

  data:
    redis:
      host: ${DEV_REDIS_HOST:localhost}
      port: ${DEV_REDIS_PORT:6379}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

  jpa:
    # Flyway manages schema — skip Hibernate's slow remote introspection
    hibernate:
      ddl-auto: none
    # Enable SQL logging for debugging
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        # Hibernate statistics disabled to reduce log noise (enable for N+1 debugging)
        generate_statistics: false
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 100

  flyway:
    # Re-enabled for schema consistency (P0 stabilization)
    enabled: true
    # Relaxed validation for development - allow schema drift during active development
    validate-on-migrate: false
    # Allow out-of-order migrations in dev (team may commit migrations non-sequentially)
    out-of-order: true
    # Baseline on existing database if Flyway hasn't run before
    baseline-on-migrate: true
    baseline-version: 18
    # Auto-repair failed migration checksums in dev (e.g. after fixing a broken migration)
    repair-on-migrate: true

app:
  jwt:
    # JWT_SECRET is REQUIRED - no default value for security
    # For local development, set JWT_SECRET in your environment or .env file
    # Example: export JWT_SECRET="your-dev-secret-at-least-256-bits-long-for-hmac-sha256"
    secret: ${JWT_SECRET}
    expiration: 3600000
    refresh-expiration: 86400000

  # Dev profile: disable secure cookies (localhost doesn't have HTTPS)
  cookie:
    secure: false
  security:
    csrf:
      enabled: true

  # CORS — enumerate all frontend dev origins; never use "*" (CSWSH risk)
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:8080

  # Dev uses Google Drive with dev service account
  google-drive:
    credentials-path: ${GOOGLE_DRIVE_CREDENTIALS_PATH:config/google-drive-dev-credentials.json}
    root-folder-id: ${GOOGLE_DRIVE_ROOT_FOLDER_ID:}
    application-name: NU-AURA-HRMS-DEV

  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}

  # Rate limiting enabled in dev with generous limits for local testing
  rate-limit:
    enabled: true
    requests-per-minute: 300

  # Reduced thread pools for local dev — prevents OOM under macOS memory pressure
  async:
    core-pool-size: 2
    max-pool-size: 8
    queue-capacity: 200

# Development health probes with relaxed group membership validation
management:
  endpoint:
    health:
      # Show all health details in dev
      show-details: always
      probes:
        enabled: true
      # Don't validate group membership in dev (not all contributors may have full setup)
      validate-group-membership: false
      group:
        liveness:
          include: ping,diskSpace
        readiness:
          include: ping

server:
  error:
    # Show detailed error information in development
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

logging:
  level:
    com.hrms: DEBUG
    # Security DEBUG generates hundreds of lines during startup — use INFO
    org.springframework.security: INFO
    # SQL DEBUG: logs every statement — useful for N+1 diagnosis; set to WARN when not needed
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    # Statistics DEBUG: logs session-level query counts — enables N+1 detection via
    # generate_statistics=true in application.yml (off by default; enable per-session as needed)
    org.hibernate.stat: DEBUG
    org.hibernate.engine.internal.StatisticalLoggingSessionEventListener: ERROR
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
    # Suppress noisy startup logs
    org.springframework.boot.autoconfigure: INFO
    org.springframework.data.repository.config: WARN