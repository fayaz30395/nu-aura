  # ============================================================
  # UC-CRUD-* — 41 interactive journeys
  # ============================================================

  # Employees
  - id: UC-CRUD-EMP-001
    category: CRUD
    module: employees
    role: HR_ADMIN
    route: /employees
    journey:
      - nav: /employees
      - click: button[data-testid="add-employee"]
      - form:
          first_name: "Canary"
          last_name: "Temp"
          email: "canary.temp@nulogic.io"
          department: "Engineering"
      - submit
      - assert_toast: "Employee created"
      - assert_row_contains: "Canary Temp"
    severity_on_miss: P1
  - id: UC-CRUD-EMP-002
    category: CRUD
    module: employees
    role: HR_ADMIN
    route: /employees/{id}
    journey:
      - open_first_row
      - click: button[data-testid="edit-personal"]
      - form: { phone: "+91-9000000001" }
      - submit
      - reload
      - assert_text_contains: "+91-9000000001"
    severity_on_miss: P1
  - id: UC-CRUD-EMP-003
    category: CRUD
    module: employees
    role: HR_ADMIN
    route: /employees/{id}/documents
    journey:
      - open_first_row
      - click: tab[data-testid="documents"]
      - upload: { selector: "input[type=file]", file: "fixture.pdf" }
      - assert_row_contains: "fixture.pdf"
    severity_on_miss: P1
  - id: UC-CRUD-EMP-004
    category: CRUD
    module: employees
    role: HR_MANAGER
    route: /employees
    journey:
      - nav: /employees
      - fill: { selector: "input[data-testid=search]", value: "saran" }
      - assert_row_count: 1
    severity_on_miss: P2
  - id: UC-CRUD-EMP-005
    category: CRUD
    module: employees
    role: MANAGER
    route: /employees
    journey:
      - nav: /employees
      - select: { selector: "[data-testid=filter-dept]", value: "Engineering" }
      - assert_all_rows_match_column: { column: "department", value: "Engineering" }
    severity_on_miss: P2

  # Leave
  - id: UC-CRUD-LEAVE-001
    category: CRUD
    module: leave
    role: EMPLOYEE
    route: /me/leave
    journey:
      - nav: /me/leave
      - click: button[data-testid="apply-leave"]
      - form:
          leave_type: CASUAL
          from_date: <tomorrow>
          to_date: <tomorrow>
          reason: "Personal"
      - submit
      - assert_toast: "Leave request submitted"
      - assert_row_exists: tr[data-status="PENDING"]
    severity_on_miss: P1
    downstream_uc: UC-APPR-LEAVE-001
  - id: UC-CRUD-LEAVE-002
    category: CRUD
    module: leave
    role: TEAM_LEAD
    route: /leave
    journey:
      - nav: /leave
      - click: tab[data-testid="team-calendar"]
      - assert_element_visible: "[data-testid=team-leave-calendar]"
      - assert_row_count_at_least: 1
    severity_on_miss: P1
  - id: UC-CRUD-LEAVE-003
    category: CRUD
    module: leave
    role: HR_MANAGER
    route: /leave
    journey:
      - nav: /leave
      - click: tab[data-testid="all-calendar"]
      - assert_element_visible: "[data-testid=all-leave-calendar]"
    severity_on_miss: P1
  - id: UC-CRUD-LEAVE-004
    category: CRUD
    module: leave
    role: EMPLOYEE
    route: /me/leave
    depends_on: UC-CRUD-LEAVE-001
    journey:
      - nav: /me/leave
      - click: tr[data-status="PENDING"] button[data-testid="cancel"]
      - assert_row_status: CANCELLED
    severity_on_miss: P1
  - id: UC-CRUD-LEAVE-005
    category: CRUD
    module: leave
    role: HR_ADMIN
    route: /leave
    journey:
      - nav: /leave
      - click: tab[data-testid="balances"]
      - open_first_row
      - click: button[data-testid="edit-balance"]
      - form: { casual: "12", reason: "canary" }
      - submit
      - assert_audit_row_exists: { reason: "canary" }
    severity_on_miss: P1

  # Attendance
  - id: UC-CRUD-ATT-001
    category: CRUD
    module: attendance
    role: EMPLOYEE
    route: /me/attendance
    journey:
      - nav: /me/attendance
      - click: button[data-testid="clock-in"]
      - assert_element_visible: "[data-testid=current-session-timer]"
