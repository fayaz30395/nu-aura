<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #475569; }
      .section { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .nodeTitle { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .nodeText { font: 400 14px Arial, sans-serif; fill: #334155; }
      .band { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .signal { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 14; }
      .process { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 14; }
      .decision { fill: #fdf2f8; stroke: #db2777; stroke-width: 2; rx: 14; }
      .result { fill: #ecfdf5; stroke: #16a34a; stroke-width: 2; rx: 14; }
      .line { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1500" height="900" class="bg"/>

  <text x="750" y="44" text-anchor="middle" class="title">Geo-Based Merchandising Flow</text>
  <text x="750" y="68" text-anchor="middle" class="subtitle">How location and weather signals become visible merchandising actions on search and category pages</text>

  <rect x="60" y="105" width="1380" height="125" class="band"/>
  <text x="85" y="135" class="section">1. Input Signals</text>
  <rect x="110" y="155" width="220" height="50" class="signal"/>
  <text x="220" y="184" text-anchor="middle" class="nodeTitle">Search / PLP Request</text>
  <rect x="380" y="155" width="210" height="50" class="signal"/>
  <text x="485" y="184" text-anchor="middle" class="nodeTitle">IP Geolocation</text>
  <rect x="640" y="155" width="250" height="50" class="signal"/>
  <text x="765" y="184" text-anchor="middle" class="nodeTitle">Saved Address / PIN</text>
  <rect x="940" y="155" width="220" height="50" class="signal"/>
  <text x="1050" y="184" text-anchor="middle" class="nodeTitle">Device Locale / GPS</text>
  <rect x="1210" y="155" width="180" height="50" class="signal"/>
  <text x="1300" y="184" text-anchor="middle" class="nodeTitle">Promo Calendar</text>

  <rect x="60" y="260" width="1380" height="180" class="band"/>
  <text x="85" y="290" class="section">2. Resolve the Customer Context</text>
  <rect x="130" y="325" width="280" height="78" class="process"/>
  <text x="270" y="355" text-anchor="middle" class="nodeTitle">Location Resolver</text>
  <text x="270" y="378" text-anchor="middle" class="nodeText">choose the best available location signal</text>
  <rect x="470" y="325" width="260" height="78" class="process"/>
  <text x="600" y="355" text-anchor="middle" class="nodeTitle">Market Mapping</text>
  <text x="600" y="378" text-anchor="middle" class="nodeText">map city into region, climate, and demand cluster</text>
  <rect x="790" y="325" width="260" height="78" class="process"/>
  <text x="920" y="355" text-anchor="middle" class="nodeTitle">Weather Context</text>
  <text x="920" y="378" text-anchor="middle" class="nodeText">current condition plus short-range forecast</text>
  <rect x="1110" y="325" width="260" height="78" class="process"/>
  <text x="1240" y="355" text-anchor="middle" class="nodeTitle">Seasonal Context</text>
  <text x="1240" y="378" text-anchor="middle" class="nodeText">season, holiday, festival, campaign period</text>

  <rect x="60" y="470" width="1380" height="180" class="band"/>
  <text x="85" y="500" class="section">3. Apply Business Logic</text>
  <rect x="120" y="535" width="310" height="80" class="decision"/>
  <text x="275" y="565" text-anchor="middle" class="nodeTitle">Geo Merchandising Rules</text>
  <text x="275" y="588" text-anchor="middle" class="nodeText">seasonal, regional, weather-triggered, campaign rules</text>
  <rect x="490" y="535" width="320" height="80" class="decision"/>
  <text x="650" y="565" text-anchor="middle" class="nodeTitle">Representative Use Cases</text>
  <text x="650" y="588" text-anchor="middle" class="nodeText">Chicago snowstorm -> boots up | Miami heatwave -> resortwear up</text>
  <rect x="870" y="535" width="450" height="80" class="decision"/>
  <text x="1095" y="565" text-anchor="middle" class="nodeTitle">Commercial Guardrails</text>
  <text x="1095" y="588" text-anchor="middle" class="nodeText">do not push low-stock, low-margin, blocked, or irrelevant assortments</text>

  <rect x="60" y="680" width="1380" height="140" class="band"/>
  <text x="85" y="710" class="section">4. Visible Storefront Actions</text>
  <rect x="110" y="740" width="280" height="52" class="result"/>
  <text x="250" y="772" text-anchor="middle" class="nodeTitle">Boost relevant products and categories</text>
  <rect x="440" y="740" width="280" height="52" class="result"/>
  <text x="580" y="772" text-anchor="middle" class="nodeTitle">Suppress low-relevance assortment</text>
  <rect x="770" y="740" width="280" height="52" class="result"/>
  <text x="910" y="772" text-anchor="middle" class="nodeTitle">Add banners, badges, default facets</text>
  <rect x="1100" y="740" width="280" height="52" class="result"/>
  <text x="1240" y="772" text-anchor="middle" class="nodeTitle">Log reason codes for analytics</text>

  <path d="M330 180 L380 180" class="line"/>
  <path d="M590 180 L640 180" class="line"/>
  <path d="M890 180 L940 180" class="line"/>
  <path d="M1160 180 L1210 180" class="line"/>

  <path d="M220 205 L270 325" class="line"/>
  <path d="M485 205 L270 325" class="line"/>
  <path d="M765 205 L270 325" class="line"/>
  <path d="M1050 205 L270 325" class="line"/>
  <path d="M300 364 L470 364" class="line"/>
  <path d="M730 364 L790 364" class="line"/>
  <path d="M1300 205 L1240 325" class="line"/>

  <path d="M600 403 L275 535" class="line"/>
  <path d="M920 403 L275 535" class="line"/>
  <path d="M1240 403 L275 535" class="line"/>
  <path d="M430 575 L490 575" class="line"/>
  <path d="M810 575 L870 575" class="line"/>

  <path d="M1095 615 L250 740" class="line"/>
  <path d="M1095 615 L580 740" class="line"/>
  <path d="M1095 615 L910 740" class="line"/>
  <path d="M1095 615 L1240 740" class="line"/>
</svg>
