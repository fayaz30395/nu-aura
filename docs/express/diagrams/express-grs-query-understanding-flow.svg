<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #475569; }
      .section { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .nodeTitle { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .nodeText { font: 400 14px Arial, sans-serif; fill: #334155; }
      .band { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .input { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 14; }
      .process { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 14; }
      .nlp { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 14; }
      .result { fill: #ecfdf5; stroke: #16a34a; stroke-width: 2; rx: 14; }
      .line { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1500" height="920" class="bg"/>

  <text x="750" y="44" text-anchor="middle" class="title">Intelligent Query Understanding Flow</text>
  <text x="750" y="68" text-anchor="middle" class="subtitle">Readable proposal view of how a messy text query becomes a search-ready plan</text>

  <rect x="70" y="105" width="1360" height="110" class="band"/>
  <text x="95" y="135" class="section">1. Raw User Input</text>
  <rect x="170" y="155" width="420" height="40" class="input"/>
  <text x="380" y="181" text-anchor="middle" class="nodeTitle">User Query: "blk maxi drss"</text>

  <rect x="70" y="250" width="1360" height="170" class="band"/>
  <text x="95" y="280" class="section">2. Normalize the Query</text>
  <rect x="120" y="315" width="280" height="76" class="process"/>
  <text x="260" y="345" text-anchor="middle" class="nodeTitle">Tokenize + Normalize</text>
  <text x="260" y="368" text-anchor="middle" class="nodeText">clean spaces, lowercase, split terms</text>
  <rect x="470" y="315" width="280" height="76" class="process"/>
  <text x="610" y="345" text-anchor="middle" class="nodeTitle">Spell Correction</text>
  <text x="610" y="368" text-anchor="middle" class="nodeText">blk -> black | drss -> dress</text>
  <rect x="820" y="315" width="280" height="76" class="process"/>
  <text x="960" y="345" text-anchor="middle" class="nodeTitle">Synonym Expansion</text>
  <text x="960" y="368" text-anchor="middle" class="nodeText">equate aliases and domain-specific terms</text>

  <rect x="70" y="455" width="1360" height="200" class="band"/>
  <text x="95" y="485" class="section">3. Understand What the User Means</text>
  <rect x="110" y="525" width="280" height="84" class="nlp"/>
  <text x="250" y="557" text-anchor="middle" class="nodeTitle">Intent Detection</text>
  <text x="250" y="580" text-anchor="middle" class="nodeText">is this a product search, attribute search, or browse intent?</text>
  <rect x="445" y="525" width="280" height="84" class="nlp"/>
  <text x="585" y="557" text-anchor="middle" class="nodeTitle">Entity Extraction</text>
  <text x="585" y="580" text-anchor="middle" class="nodeText">identify color, style, category, brand, fit</text>
  <rect x="780" y="525" width="280" height="84" class="nlp"/>
  <text x="920" y="557" text-anchor="middle" class="nodeTitle">Query Expansion</text>
  <text x="920" y="580" text-anchor="middle" class="nodeText">add recall terms such as dress, gown, maxi dress</text>
  <rect x="1115" y="525" width="260" height="84" class="nlp"/>
  <text x="1245" y="557" text-anchor="middle" class="nodeTitle">Fallback Rules</text>
  <text x="1245" y="580" text-anchor="middle" class="nodeText">recover from no-results with safe rewrites</text>

  <rect x="70" y="690" width="1360" height="165" class="band"/>
  <text x="95" y="720" class="section">4. Build the Search Plan</text>
  <rect x="110" y="750" width="300" height="70" class="result"/>
  <text x="260" y="778" text-anchor="middle" class="nodeTitle">Structured Query Object</text>
  <text x="260" y="800" text-anchor="middle" class="nodeText">category=dresses | color=black | style=maxi</text>
  <rect x="480" y="750" width="280" height="70" class="result"/>
  <text x="620" y="778" text-anchor="middle" class="nodeTitle">Semantic Search Vector</text>
  <text x="620" y="800" text-anchor="middle" class="nodeText">embedding for semantic retrieval</text>
  <rect x="830" y="750" width="500" height="70" class="result"/>
  <text x="1080" y="778" text-anchor="middle" class="nodeTitle">Final Search Plan Sent to Retrieval + Ranking</text>
  <text x="1080" y="800" text-anchor="middle" class="nodeText">text=black maxi dress | filters=color:black, length:maxi</text>

  <path d="M380 195 L260 315" class="line"/>
  <path d="M400 353 L470 353" class="line"/>
  <path d="M750 353 L820 353" class="line"/>

  <path d="M960 391 L250 525" class="line"/>
  <path d="M960 391 L585 525" class="line"/>
  <path d="M960 391 L920 525" class="line"/>
  <path d="M960 391 L1245 525" class="line"/>

  <path d="M250 609 L260 750" class="line"/>
  <path d="M585 609 L260 750" class="line"/>
  <path d="M920 609 L620 750" class="line"/>
  <path d="M1245 609 L1080 750" class="line"/>
  <path d="M410 785 L480 785" class="line"/>
  <path d="M760 785 L830 785" class="line"/>
</svg>
