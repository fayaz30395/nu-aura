version: '3.9'

# NU-AURA HRMS — Development Docker Compose
# For production, use docker-compose.prod.yml (see .env.production.example for required vars)
# For demo mode (seed data), add override: docker-compose -f docker-compose.yml -f docker-compose.demo.yml up

services:
  postgres:
    image: postgres:16-alpine
    container_name: hrms-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hrms_dev
      POSTGRES_USER: hrms
      POSTGRES_PASSWORD: hrms_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrms -d hrms_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hrms_network

  redis:
    image: redis:7-alpine
    container_name: hrms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hrms_network

  minio:
    image: minio/minio:latest
    container_name: hrms-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - hrms_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms-backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hrms_dev
      SPRING_DATASOURCE_USERNAME: hrms
      SPRING_DATASOURCE_PASSWORD: hrms_dev_password
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      # DEV ONLY — replace with APP_SECURITY_ENCRYPTION_KEY in production
      JWT_SECRET: local-dev-jwt-secret-change-in-production-minimum-32-chars
      APP_SECURITY_ENCRYPTION_KEY: local-dev-enc-key-change-in-prod-32b
      FRONTEND_URL: http://localhost:3000
    networks:
      - hrms_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hrms-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    networks:
      - hrms_network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  hrms_network:
    driver: bridge
