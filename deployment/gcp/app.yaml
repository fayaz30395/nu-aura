# Google App Engine Configuration for HRMS Backend
# Alternative to Cloud Run for App Engine Standard/Flexible Environment

runtime: java17
env: flex

# Instance configuration
instance_class: F2

# Automatic scaling configuration
automatic_scaling:
  min_num_instances: 1
  max_num_instances: 10
  cool_down_period_sec: 120
  cpu_utilization:
    target_utilization: 0.7
  target_concurrent_requests: 100

# Resource settings
resources:
  cpu: 2
  memory_gb: 4
  disk_size_gb: 10

# Health check configuration
health_check:
  enable_health_check: true
  check_interval_sec: 30
  timeout_sec: 10
  unhealthy_threshold: 3
  healthy_threshold: 2

liveness_check:
  path: "/actuator/health/liveness"
  check_interval_sec: 30
  timeout_sec: 10
  failure_threshold: 3
  success_threshold: 1

readiness_check:
  path: "/actuator/health/readiness"
  check_interval_sec: 30
  timeout_sec: 10
  failure_threshold: 3
  success_threshold: 1
  app_start_timeout_sec: 300

# Network settings
network:
  forwarded_ports:
    - 8080
  session_affinity: true

# Environment variables
env_variables:
  SPRING_PROFILES_ACTIVE: "prod"
  PORT: "8080"
  SERVER_ADDRESS: "0.0.0.0"
  JAVA_OPTS: "-Xmx2048m -Xms512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"

# Beta settings for Cloud SQL
beta_settings:
  cloud_sql_instances: YOUR_PROJECT:YOUR_REGION:YOUR_INSTANCE

# Handlers for routing
handlers:
  - url: /actuator/health.*
    script: auto
    secure: always

  - url: /api/.*
    script: auto
    secure: always

  - url: /swagger-ui.*
    script: auto
    secure: always

  - url: /.*
    script: auto
    secure: always

# VPC connector (if using VPC)
# vpc_access_connector:
#   name: "projects/YOUR_PROJECT/locations/YOUR_REGION/connectors/YOUR_CONNECTOR"

# Service account
# service_account: your-service-account@your-project.iam.gserviceaccount.com

# Note: For secrets, use Secret Manager and inject via environment:
# Example in deployment script:
# gcloud app deploy --set-env-vars="^:^SPRING_DATASOURCE_PASSWORD=$(gcloud secrets versions access latest --secret=db-password)"
