---
# PodDisruptionBudget for Backend
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: hrms-backend-pdb
  namespace: hrms
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: hrms-backend

---
# PodDisruptionBudget for Frontend
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: hrms-frontend-pdb
  namespace: hrms
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: hrms-frontend
