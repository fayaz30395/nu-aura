apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hrms-ingress
  namespace: hrms
  labels:
    app: hrms
  annotations:
    # GCP-specific annotations
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "hrms-static-ip"
    networking.gke.io/managed-certificates: "hrms-certificate"

    # SSL and Security
    ingress.gcp.kubernetes.io/pre-shared-cert: "hrms-ssl-cert"

    # Backend configuration
    cloud.google.com/backend-config: '{"default": "hrms-backend-config"}'

    # Cloud Armor security policy
    cloud.google.com/armor-config: '{"hrms-frontend": "hrms-security-policy", "hrms-backend": "hrms-security-policy"}'

    # Connection draining timeout
    cloud.google.com/connection-draining-timeout: "30"

    # Session affinity
    cloud.google.com/session-affinity: "CLIENT_IP"

    # Health check path
    ingress.kubernetes.io/health-check-path: "/api/health"

    # NOTE: CORS, rate limiting, and security headers are handled by:
    # - Cloud Armor security policy (WAF rules, rate limiting)
    # - Spring Security backend (CORS, OWASP headers)
    # - Next.js middleware (CSP, security headers at edge)
    # NGINX ingress annotations were removed because GCE ingress is used.
spec:
  # TODO: Replace hrms.example.com and api.hrms.example.com with production domains before deployment
  tls:
    - secretName: hrms-tls
      hosts:
        - hrms.example.com
        - api.hrms.example.com

  rules:
    # Frontend routing
    - host: hrms.example.com
      http:
        paths:
          # API requests should go to backend
          - path: /api/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: hrms-backend
                port:
                  number: 8080

          # Actuator: only health endpoint exposed externally (for load balancer probes).
          # All other actuator paths are blocked by routing to a non-existent service,
          # which returns a 404/503 from the GCE load balancer.
          - path: /actuator/health
            pathType: ImplementationSpecific
            backend:
              service:
                name: hrms-backend
                port:
                  number: 8080
          - path: /actuator/health/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: hrms-backend
                port:
                  number: 8080
          # Block all other actuator endpoints from external access
          - path: /actuator/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: hrms-actuator-deny
                port:
                  number: 9999

          # WebSocket connections
          - path: /ws/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: hrms-backend
                port:
                  number: 8080

          # All other requests go to frontend
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: hrms-frontend
                port:
                  number: 3000

    # API subdomain (optional - direct API access)
    - host: api.hrms.example.com
      http:
        paths:
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: hrms-backend
                port:
                  number: 8080

---
# Backend configuration for GCP Load Balancer
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: hrms-backend-config
  namespace: hrms
spec:
  timeoutSec: 30
  connectionDraining:
    drainingTimeoutSec: 30
  sessionAffinity:
    affinityType: "CLIENT_IP"
    affinityCookieTtlSec: 3600
  healthCheck:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /actuator/health
    port: 8080
  cdn:
    enabled: false
  iap:
    enabled: false
  logging:
    enable: true
    sampleRate: 1.0

---
# Managed Certificate for automatic SSL provisioning
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: hrms-certificate
  namespace: hrms
spec:
  domains:
    - hrms.example.com
    - api.hrms.example.com
