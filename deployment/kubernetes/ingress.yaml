apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hrms-ingress
  namespace: hrms
  labels:
    app: hrms
  annotations:
    # GCP-specific annotations
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "hrms-static-ip"
    networking.gke.io/managed-certificates: "hrms-certificate"

    # SSL and Security
    ingress.gcp.kubernetes.io/pre-shared-cert: "hrms-ssl-cert"

    # Backend configuration
    cloud.google.com/backend-config: '{"default": "hrms-backend-config"}'

    # Cloud Armor security policy
    cloud.google.com/armor-config: '{"hrms-frontend": "hrms-security-policy", "hrms-backend": "hrms-security-policy"}'

    # Connection draining timeout
    cloud.google.com/connection-draining-timeout: "30"

    # Session affinity
    cloud.google.com/session-affinity: "CLIENT_IP"

    # Health check path
    ingress.kubernetes.io/health-check-path: "/api/health"

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"

    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    # TODO: Replace with exact production subdomain once DNS is finalised (e.g. https://app.nulogic.io)
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://*.nulogic.io, https://localhost:3000"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: geolocation=(), microphone=(), camera=()";
      more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://accounts.google.com https://*.googleapis.com; frame-ancestors 'none';";
spec:
  tls:
  - secretName: hrms-tls
    hosts:
    - hrms.example.com
    - api.hrms.example.com

  rules:
  # Frontend routing
  - host: hrms.example.com
    http:
      paths:
      # API requests should go to backend
      - path: /api/*
        pathType: ImplementationSpecific
        backend:
          service:
            name: hrms-backend
            port:
              number: 8080

      # Actuator endpoints (restricted)
      - path: /actuator/*
        pathType: ImplementationSpecific
        backend:
          service:
            name: hrms-backend
            port:
              number: 8080

      # WebSocket connections
      - path: /ws/*
        pathType: ImplementationSpecific
        backend:
          service:
            name: hrms-backend
            port:
              number: 8080

      # All other requests go to frontend
      - path: /*
        pathType: ImplementationSpecific
        backend:
          service:
            name: hrms-frontend
            port:
              number: 3000

  # API subdomain (optional - direct API access)
  - host: api.hrms.example.com
    http:
      paths:
      - path: /*
        pathType: ImplementationSpecific
        backend:
          service:
            name: hrms-backend
            port:
              number: 8080

---
# Backend configuration for GCP Load Balancer
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: hrms-backend-config
  namespace: hrms
spec:
  timeoutSec: 30
  connectionDraining:
    drainingTimeoutSec: 30
  sessionAffinity:
    affinityType: "CLIENT_IP"
    affinityCookieTtlSec: 3600
  healthCheck:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /actuator/health
    port: 8080
  cdn:
    enabled: false
  iap:
    enabled: false
  logging:
    enable: true
    sampleRate: 1.0

---
# Managed Certificate for automatic SSL provisioning
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: hrms-certificate
  namespace: hrms
spec:
  domains:
  - hrms.example.com
  - api.hrms.example.com
