# Kubernetes Secrets Template for HRMS Platform
# IMPORTANT: This is a TEMPLATE file. DO NOT commit actual secrets to version control.
# Use one of the following approaches for production:
# 1. GCP Secret Manager with External Secrets Operator
# 2. Sealed Secrets
# 3. kubectl create secret from files/literals
# 4. CI/CD pipeline injection

---
# Backend Secrets Template (Base64 encoded values required)
# To create: kubectl create secret generic hrms-backend-secrets --from-env-file=.env -n hrms
apiVersion: v1
kind: Secret
metadata:
  name: hrms-backend-secrets
  namespace: hrms
  labels:
    app: hrms-backend
    tier: backend
type: Opaque
data:
  # Database credentials (base64 encoded)
  # Example: echo -n "jdbc:postgresql://postgres-service:5432/hrms" | base64
  SPRING_DATASOURCE_URL: "<BASE64_ENCODED_DATABASE_URL>"
  SPRING_DATASOURCE_USERNAME: "<BASE64_ENCODED_DB_USERNAME>"
  SPRING_DATASOURCE_PASSWORD: "<BASE64_ENCODED_DB_PASSWORD>"

  # Redis credentials (if password protected)
  SPRING_REDIS_PASSWORD: "<BASE64_ENCODED_REDIS_PASSWORD>"

  # JWT Secret (must be strong and random)
  JWT_SECRET: "<BASE64_ENCODED_JWT_SECRET>"

  # Google OAuth credentials
  GOOGLE_CLIENT_ID: "<BASE64_ENCODED_GOOGLE_CLIENT_ID>"
  GOOGLE_CLIENT_SECRET: "<BASE64_ENCODED_GOOGLE_CLIENT_SECRET>"

  # Email credentials
  MAIL_USERNAME: "<BASE64_ENCODED_EMAIL_USERNAME>"
  MAIL_PASSWORD: "<BASE64_ENCODED_EMAIL_PASSWORD>"

  # MinIO credentials
  MINIO_ACCESS_KEY: "<BASE64_ENCODED_MINIO_ACCESS_KEY>"
  MINIO_SECRET_KEY: "<BASE64_ENCODED_MINIO_SECRET_KEY>"

  # OpenAI API Key
  OPENAI_API_KEY: "<BASE64_ENCODED_OPENAI_API_KEY>"

---
# Example of creating secrets using stringData (not base64 encoded)
# This approach is easier but less secure for version control
apiVersion: v1
kind: Secret
metadata:
  name: hrms-backend-secrets-example
  namespace: hrms
  labels:
    app: hrms-backend
type: Opaque
stringData:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-service:5432/hrms"
  SPRING_DATASOURCE_USERNAME: "hrms_user"
  SPRING_DATASOURCE_PASSWORD: "CHANGE_THIS_PASSWORD"
  SPRING_REDIS_PASSWORD: ""
  JWT_SECRET: "CHANGE_THIS_TO_A_VERY_LONG_RANDOM_SECRET_AT_LEAST_64_CHARACTERS_LONG"
  GOOGLE_CLIENT_ID: "your-client-id.apps.googleusercontent.com"
  GOOGLE_CLIENT_SECRET: "your-client-secret"
  MAIL_USERNAME: "your-email@gmail.com"
  MAIL_PASSWORD: "your-app-password"
  MINIO_ACCESS_KEY: "minio-access-key"
  MINIO_SECRET_KEY: "minio-secret-key"
  OPENAI_API_KEY: "sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

---
# TLS Secret for HTTPS (if using custom certificates)
# Create using: kubectl create secret tls hrms-tls-secret --cert=tls.crt --key=tls.key -n hrms
apiVersion: v1
kind: Secret
metadata:
  name: hrms-tls-secret
  namespace: hrms
  labels:
    app: hrms-platform
type: kubernetes.io/tls
data:
  tls.crt: "<BASE64_ENCODED_CERTIFICATE>"
  tls.key: "<BASE64_ENCODED_PRIVATE_KEY>"

---
# Docker registry secret (if using private registry)
# Create using: kubectl create secret docker-registry gcr-json-key \
#   --docker-server=gcr.io \
#   --docker-username=_json_key \
#   --docker-password="$(cat ~/key.json)" \
#   --docker-email=your-email@example.com -n hrms
apiVersion: v1
kind: Secret
metadata:
  name: gcr-json-key
  namespace: hrms
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: "<BASE64_ENCODED_DOCKER_CONFIG>"

---
# External Secrets Operator Configuration (Recommended for GCP)
# This uses GCP Secret Manager for storing secrets
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: gcpsm-secret-store
  namespace: hrms
spec:
  provider:
    gcpsm:
      projectID: "YOUR_GCP_PROJECT_ID"
      auth:
        workloadIdentity:
          clusterLocation: us-central1
          clusterName: hrms-cluster
          serviceAccountRef:
            name: hrms-backend-sa

---
# External Secret for Backend (pulls from GCP Secret Manager)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: hrms-backend-external-secret
  namespace: hrms
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-secret-store
    kind: SecretStore

  target:
    name: hrms-backend-secrets
    creationPolicy: Owner

  data:
    # Database credentials
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef:
        key: hrms-database-url

    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef:
        key: hrms-database-username

    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: hrms-database-password

    # Redis password
    - secretKey: SPRING_REDIS_PASSWORD
      remoteRef:
        key: hrms-redis-password

    # JWT Secret
    - secretKey: JWT_SECRET
      remoteRef:
        key: hrms-jwt-secret

    # Google OAuth
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: hrms-google-client-id

    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: hrms-google-client-secret

    # Email credentials
    - secretKey: MAIL_USERNAME
      remoteRef:
        key: hrms-mail-username

    - secretKey: MAIL_PASSWORD
      remoteRef:
        key: hrms-mail-password

    # MinIO credentials
    - secretKey: MINIO_ACCESS_KEY
      remoteRef:
        key: hrms-minio-access-key

    - secretKey: MINIO_SECRET_KEY
      remoteRef:
        key: hrms-minio-secret-key

    # OpenAI API Key
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: hrms-openai-api-key

---
# Sealed Secret Template (if using Sealed Secrets)
# First, install kubeseal: https://github.com/bitnami-labs/sealed-secrets
# Then create sealed secret: kubeseal --format yaml < secret.yaml > sealed-secret.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: hrms-backend-sealed-secrets
  namespace: hrms
spec:
  encryptedData:
    # These are encrypted by kubeseal and safe to commit
    SPRING_DATASOURCE_URL: "<SEALED_SECRET_VALUE>"
    SPRING_DATASOURCE_USERNAME: "<SEALED_SECRET_VALUE>"
    SPRING_DATASOURCE_PASSWORD: "<SEALED_SECRET_VALUE>"
    JWT_SECRET: "<SEALED_SECRET_VALUE>"
    GOOGLE_CLIENT_ID: "<SEALED_SECRET_VALUE>"
    GOOGLE_CLIENT_SECRET: "<SEALED_SECRET_VALUE>"
    MAIL_USERNAME: "<SEALED_SECRET_VALUE>"
    MAIL_PASSWORD: "<SEALED_SECRET_VALUE>"
    MINIO_ACCESS_KEY: "<SEALED_SECRET_VALUE>"
    MINIO_SECRET_KEY: "<SEALED_SECRET_VALUE>"
    OPENAI_API_KEY: "<SEALED_SECRET_VALUE>"

---
# OAuth Client Secret (for Identity-Aware Proxy)
apiVersion: v1
kind: Secret
metadata:
  name: oauth-client-secret
  namespace: hrms
type: Opaque
stringData:
  client_id: "client-id.apps.googleusercontent.com"
  client_secret: "client-secret-value"

---
# INSTRUCTIONS FOR CREATING SECRETS IN PRODUCTION:

# 1. Using kubectl directly (manual method):
#    kubectl create secret generic hrms-backend-secrets \
#      --from-literal=SPRING_DATASOURCE_URL='jdbc:postgresql://...' \
#      --from-literal=SPRING_DATASOURCE_USERNAME='hrms_user' \
#      --from-literal=SPRING_DATASOURCE_PASSWORD='secure-password' \
#      --from-literal=JWT_SECRET='very-long-random-secret' \
#      --from-literal=GOOGLE_CLIENT_ID='your-client-id' \
#      --from-literal=GOOGLE_CLIENT_SECRET='your-client-secret' \
#      --from-literal=MAIL_USERNAME='email@example.com' \
#      --from-literal=MAIL_PASSWORD='app-password' \
#      --from-literal=MINIO_ACCESS_KEY='access-key' \
#      --from-literal=MINIO_SECRET_KEY='secret-key' \
#      --from-literal=OPENAI_API_KEY='sk-xxx' \
#      --namespace=hrms

# 2. Using GCP Secret Manager (recommended):
#    # Create secrets in GCP Secret Manager
#    echo -n "jdbc:postgresql://..." | gcloud secrets create hrms-database-url --data-file=-
#    echo -n "hrms_user" | gcloud secrets create hrms-database-username --data-file=-
#    echo -n "secure-password" | gcloud secrets create hrms-database-password --data-file=-
#
#    # Install External Secrets Operator
#    helm repo add external-secrets https://charts.external-secrets.io
#    helm install external-secrets external-secrets/external-secrets -n external-secrets-system --create-namespace
#
#    # Apply ExternalSecret configuration (defined above)
#    kubectl apply -f secrets.yaml

# 3. Using environment files:
#    kubectl create secret generic hrms-backend-secrets --from-env-file=.env.production -n hrms

# 4. Using Sealed Secrets:
#    # Install sealed-secrets controller
#    kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.24.0/controller.yaml
#
#    # Install kubeseal CLI
#    # Create secret file and seal it
#    kubeseal --format yaml < secret.yaml > sealed-secret.yaml
#    kubectl apply -f sealed-secret.yaml

# 5. Base64 encoding for manual data entry:
#    echo -n "your-secret-value" | base64
#    # Use the output in the data section above
