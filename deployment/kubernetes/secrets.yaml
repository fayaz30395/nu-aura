apiVersion: v1
kind: Secret
metadata:
  name: hrms-secrets
  namespace: hrms
  labels:
    app: hrms
type: Opaque
stringData:
  # Database Configuration
  DATABASE_URL: "postgresql://REPLACE_DB_USER:REPLACE_DB_PASSWORD@REPLACE_DB_HOST:5432/hrms_db"
  DB_USERNAME: "REPLACE_DB_USER"
  DB_PASSWORD: "REPLACE_DB_PASSWORD"

  # JWT Configuration
  JWT_SECRET: "REPLACE_WITH_STRONG_JWT_SECRET_MIN_32_CHARS"
  JWT_EXPIRATION: "86400000"

  # Redis Configuration
  REDIS_HOST: "REPLACE_REDIS_HOST"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "REPLACE_REDIS_PASSWORD"

  # MinIO/S3 Configuration
  MINIO_ENDPOINT: "REPLACE_MINIO_ENDPOINT"
  MINIO_ACCESS_KEY: "REPLACE_MINIO_ACCESS_KEY"
  MINIO_SECRET_KEY: "REPLACE_MINIO_SECRET_KEY"
  MINIO_BUCKET: "hrms-uploads"

  # Email Configuration
  MAIL_HOST: "smtp.gmail.com"
  MAIL_PORT: "587"
  MAIL_USERNAME: "REPLACE_EMAIL_USERNAME"
  MAIL_PASSWORD: "REPLACE_EMAIL_PASSWORD"

  # Google OAuth Configuration
  GOOGLE_CLIENT_ID: "REPLACE_GOOGLE_CLIENT_ID"
  GOOGLE_CLIENT_SECRET: "REPLACE_GOOGLE_CLIENT_SECRET"

  # Backend API Configuration
  NEXT_PUBLIC_API_URL: "https://hrms.example.com/api"
  NEXTAUTH_SECRET: "REPLACE_WITH_NEXTAUTH_SECRET_MIN_32_CHARS"
  NEXTAUTH_URL: "https://hrms.example.com"

---
apiVersion: v1
kind: Secret
metadata:
  name: hrms-tls
  namespace: hrms
  labels:
    app: hrms
type: kubernetes.io/tls
data:
  # Base64 encoded TLS certificate and key
  # Replace these with your actual certificate data
  # To encode: cat tls.crt | base64 -w 0
  tls.crt: REPLACE_WITH_BASE64_ENCODED_CERTIFICATE
  tls.key: REPLACE_WITH_BASE64_ENCODED_KEY
