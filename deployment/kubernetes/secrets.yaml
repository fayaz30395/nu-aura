apiVersion: v1
kind: Secret
metadata:
  name: hrms-secrets
  namespace: hrms
  labels:
    app: hrms
type: Opaque
stringData:
  # ─── Database ──────────────────────────────────────────────────────────────────
  # REQUIRED: must use jdbc:postgresql:// prefix (NOT postgresql://)
  SPRING_DATASOURCE_URL: "jdbc:postgresql://REPLACE_DB_HOST:5432/hrms"
  SPRING_DATASOURCE_USERNAME: "REPLACE_DB_USER"
  SPRING_DATASOURCE_PASSWORD: "REPLACE_DB_PASSWORD"

  # ─── JWT (Authentication) ──────────────────────────────────────────────────────
  # REQUIRED: generate with: openssl rand -hex 32
  JWT_SECRET: "REPLACE_WITH_STRONG_JWT_SECRET_MIN_32_CHARS"
  JWT_EXPIRATION: "3600000"
  JWT_REFRESH_EXPIRATION: "86400000"

  # ─── Encryption (AES-256-GCM for sensitive DB fields) ─────────────────────────
  # REQUIRED: exactly 32 bytes. Generate with: openssl rand -base64 32
  APP_SECURITY_ENCRYPTION_KEY: "REPLACE_WITH_AES256_KEY_openssl_rand_base64_32"

  # ─── Redis ─────────────────────────────────────────────────────────────────────
  SPRING_REDIS_HOST: "REPLACE_REDIS_HOST"
  SPRING_REDIS_PORT: "6379"
  SPRING_REDIS_PASSWORD: "REPLACE_REDIS_PASSWORD"
  SPRING_REDIS_SSL_ENABLED: "false"

  # ─── MinIO (File Storage) ──────────────────────────────────────────────────────
  MINIO_ENDPOINT: "https://REPLACE_MINIO_HOST:9000"
  MINIO_ACCESS_KEY: "REPLACE_MINIO_ACCESS_KEY"
  MINIO_SECRET_KEY: "REPLACE_MINIO_SECRET_KEY"
  MINIO_BUCKET: "hrms-files"

  # ─── Email (SMTP) ──────────────────────────────────────────────────────────────
  MAIL_HOST: "smtp.REPLACE_SMTP_PROVIDER.com"
  MAIL_PORT: "587"
  MAIL_USERNAME: "noreply@REPLACE_DOMAIN.com"
  MAIL_PASSWORD: "REPLACE_SMTP_APP_PASSWORD"
  MAIL_FROM: "noreply@REPLACE_DOMAIN.com"

  # ─── Google OAuth ──────────────────────────────────────────────────────────────
  GOOGLE_CLIENT_ID: "REPLACE_GOOGLE_CLIENT_ID"
  GOOGLE_CLIENT_SECRET: "REPLACE_GOOGLE_CLIENT_SECRET"

  # ─── Frontend ──────────────────────────────────────────────────────────────────
  FRONTEND_URL: "https://app.REPLACE_DOMAIN.com"
  COOKIE_DOMAIN: ".REPLACE_DOMAIN.com"

  # ─── Auth Domain Restriction ───────────────────────────────────────────────────
  AUTH_ALLOWED_DOMAIN: "REPLACE_DOMAIN.com"

  # ─── Twilio SMS (optional — set TWILIO_MOCK_MODE=false to enable) ──────────────
  TWILIO_MOCK_MODE: "true"
  TWILIO_ACCOUNT_SID: ""
  TWILIO_AUTH_TOKEN: ""
  TWILIO_FROM_NUMBER: ""
  TWILIO_MESSAGING_SERVICE_SID: ""

  # ─── Calendar Integration (optional — set CALENDAR_MOCK_MODE=false to enable) ──
  CALENDAR_MOCK_MODE: "true"
  GOOGLE_CALENDAR_CLIENT_ID: ""
  GOOGLE_CALENDAR_CLIENT_SECRET: ""
  GOOGLE_CALENDAR_REDIRECT_URI: ""
  OUTLOOK_CALENDAR_CLIENT_ID: ""
  OUTLOOK_CALENDAR_CLIENT_SECRET: ""
  OUTLOOK_TENANT_ID: ""

  # ─── OpenAI / AI (optional — ATS resume parsing) ──────────────────────────────
  OPENAI_API_KEY: ""
  OPENAI_MODEL: "gpt-4o-mini"

  # ─── Slack Notifications (optional) ───────────────────────────────────────────
  SLACK_ENABLED: "false"
  SLACK_WEBHOOK_URL: ""
  SLACK_BOT_TOKEN: ""
  SLACK_DEFAULT_CHANNEL: "#hrms-notifications"

  # ─── Frontend (Next.js public vars) ────────────────────────────────────────────
  NEXT_PUBLIC_API_URL: "https://api.REPLACE_DOMAIN.com"
  NEXT_PUBLIC_GOOGLE_CLIENT_ID: "REPLACE_GOOGLE_CLIENT_ID"

---
apiVersion: v1
kind: Secret
metadata:
  name: hrms-tls
  namespace: hrms
  labels:
    app: hrms
type: kubernetes.io/tls
data:
  # Base64 encoded TLS certificate and key
  # Replace these with your actual certificate data
  # To encode: cat tls.crt | base64 -w 0
  tls.crt: REPLACE_WITH_BASE64_ENCODED_CERTIFICATE
  tls.key: REPLACE_WITH_BASE64_ENCODED_KEY
