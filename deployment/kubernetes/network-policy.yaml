apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hrms-backend-network-policy
  namespace: hrms
  labels:
    app: hrms
    component: backend
spec:
  podSelector:
    matchLabels:
      app: hrms
      component: backend
  policyTypes:
  - Ingress
  - Egress

  ingress:
  # Allow traffic from frontend
  - from:
    - podSelector:
        matchLabels:
          app: hrms
          component: frontend
    ports:
    - protocol: TCP
      port: 8080

  # Allow traffic from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080

  # Allow traffic from monitoring namespace (Prometheus)
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 8081

  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53

  # Allow access to PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgresql
    ports:
    - protocol: TCP
      port: 5432

  # Allow access to Redis
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379

  # Allow HTTPS egress (for external APIs, OAuth, etc.)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443

  # Allow SMTP egress (for email)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 587
    - protocol: TCP
      port: 465

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hrms-frontend-network-policy
  namespace: hrms
  labels:
    app: hrms
    component: frontend
spec:
  podSelector:
    matchLabels:
      app: hrms
      component: frontend
  policyTypes:
  - Ingress
  - Egress

  ingress:
  # Allow traffic from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000

  # Allow traffic from monitoring namespace
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 3000

  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53

  # Allow access to backend
  - to:
    - podSelector:
        matchLabels:
          app: hrms
          component: backend
    ports:
    - protocol: TCP
      port: 8080

  # Allow HTTPS egress (for CDNs, external resources)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443

---
# Default deny all ingress traffic to namespace (except what's explicitly allowed)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: hrms
spec:
  podSelector: {}
  policyTypes:
  - Ingress

---
# Allow egress to internet for all pods in namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internet-egress
  namespace: hrms
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector: {}
