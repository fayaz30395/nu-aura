apiVersion: v1
kind: ConfigMap
metadata:
  name: hrms-config
  namespace: hrms
  labels:
    app: hrms
data:
  # Application Configuration
  # NOTE: 'prod' must match the spring.config.activate.on-profile name in application.yml
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8080"

  # Database Configuration
  DB_DRIVER: "org.postgresql.Driver"
  DB_POOL_MAX: "20"
  DB_POOL_MIN: "5"

  # JPA/Hibernate Configuration
  # ddl-auto MUST remain 'none'; schema is managed by Flyway migrations (V1–V9+)
  JPA_SHOW_SQL: "false"
  JPA_HIBERNATE_DDL_AUTO: "none"
  JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "false"

  # Flyway Configuration (Liquibase is NOT used — do not add LIQUIBASE_* entries)
  FLYWAY_ENABLED: "true"
  FLYWAY_LOCATIONS: "classpath:db/migration"
  FLYWAY_DEFAULT_SCHEMA: "public"
  FLYWAY_BASELINE_ON_MIGRATE: "true"

  # Redis Configuration
  REDIS_TIMEOUT: "2000"
  REDIS_LETTUCE_POOL_MAX_ACTIVE: "16"
  REDIS_LETTUCE_POOL_MAX_IDLE: "8"
  REDIS_LETTUCE_POOL_MIN_IDLE: "4"

  # Cache Configuration
  CACHE_TYPE: "redis"
  CACHE_REDIS_TIME_TO_LIVE: "3600000"

  # Email Configuration
  MAIL_SMTP_AUTH: "true"
  MAIL_SMTP_STARTTLS_ENABLE: "true"

  # Logging Configuration (production: SQL kept WARN to prevent PII leakage)
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_COM_HRMS: "INFO"
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: "WARN"
  LOGGING_LEVEL_ORG_HIBERNATE: "WARN"
  SLOW_QUERY_THRESHOLD_MS: "200"
  HIBERNATE_STATS_ENABLED: "false"

  # Actuator
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics,prometheus"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "when-authorized"
  MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"

  # File Upload Configuration
  SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: "10MB"
  SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: "10MB"

  # Server error verbosity — must remain 'never' in production (prevents info leak)
  SERVER_ERROR_INCLUDE_MESSAGE: "never"
  SERVER_ERROR_INCLUDE_BINDING: "never"

  # Security
  CSRF_ENABLED: "true"
  COOKIE_SECURE: "true"

  # Tenant Resolution
  TENANT_RESOLUTION_STRATEGY: "header"

  # Rate Limiting defaults
  RATE_LIMIT_AUTH_CAPACITY: "10"
  RATE_LIMIT_AUTH_REFILL_MIN: "1"
  RATE_LIMIT_API_CAPACITY: "100"
  RATE_LIMIT_API_REFILL_MIN: "1"
  RATE_LIMIT_EXPORT_CAPACITY: "5"
  RATE_LIMIT_EXPORT_REFILL_MIN: "5"

  # Frontend (Next.js)
  NEXT_PUBLIC_APP_NAME: "NU-AURA HRMS"
  NEXT_PUBLIC_APP_VERSION: "1.0.0"
  NEXT_PUBLIC_ENABLE_ANALYTICS: "true"
  NEXT_PUBLIC_DEMO_MODE: "false"
  NODE_ENV: "production"
