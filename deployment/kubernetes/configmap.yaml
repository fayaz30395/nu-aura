apiVersion: v1
kind: ConfigMap
metadata:
  name: hrms-config
  namespace: hrms
  labels:
    app: hrms
data:
  # Application Configuration
  SPRING_PROFILES_ACTIVE: "production"
  SERVER_PORT: "8080"

  # Database Configuration
  DB_DRIVER: "org.postgresql.Driver"
  DB_POOL_SIZE: "20"
  DB_MAX_LIFETIME: "1800000"
  DB_CONNECTION_TIMEOUT: "30000"

  # JPA/Hibernate Configuration
  JPA_SHOW_SQL: "false"
  JPA_HIBERNATE_DDL_AUTO: "validate"
  JPA_PROPERTIES_HIBERNATE_DIALECT: "org.hibernate.dialect.PostgreSQLDialect"
  JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "false"
  JPA_PROPERTIES_HIBERNATE_USE_SQL_COMMENTS: "false"

  # Liquibase Configuration
  LIQUIBASE_ENABLED: "true"
  LIQUIBASE_CHANGE_LOG: "classpath:db/changelog/db.changelog-master.xml"

  # Redis Configuration
  REDIS_TIMEOUT: "60000"
  REDIS_LETTUCE_POOL_MAX_ACTIVE: "8"
  REDIS_LETTUCE_POOL_MAX_IDLE: "8"
  REDIS_LETTUCE_POOL_MIN_IDLE: "0"

  # Cache Configuration
  CACHE_TYPE: "redis"
  CACHE_REDIS_TIME_TO_LIVE: "600000"

  # Email Configuration
  MAIL_PROTOCOL: "smtp"
  MAIL_SMTP_AUTH: "true"
  MAIL_SMTP_STARTTLS_ENABLE: "true"
  MAIL_FROM: "noreply@hrms.example.com"

  # MinIO Configuration
  MINIO_SECURE: "true"

  # Logging Configuration
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_COM_HRMS: "INFO"
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: "WARN"
  LOGGING_LEVEL_ORG_HIBERNATE: "WARN"
  LOGGING_PATTERN_CONSOLE: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  LOGGING_PATTERN_FILE: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

  # Actuator Configuration
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,metrics,prometheus,info"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "when-authorized"
  MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"

  # CORS Configuration
  CORS_ALLOWED_ORIGINS: "https://hrms.example.com"
  CORS_ALLOWED_METHODS: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
  CORS_ALLOWED_HEADERS: "*"
  CORS_ALLOW_CREDENTIALS: "true"
  CORS_MAX_AGE: "3600"

  # File Upload Configuration
  SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: "10MB"
  SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: "10MB"

  # Rate Limiting
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_CAPACITY: "100"
  RATE_LIMIT_REFILL_TOKENS: "100"
  RATE_LIMIT_REFILL_DURATION: "60"

  # Security
  SECURITY_REQUIRE_SSL: "true"
  SECURITY_SESSION_TIMEOUT: "1800"

  # Frontend Environment Variables
  NEXT_PUBLIC_APP_NAME: "HRMS Platform"
  NEXT_PUBLIC_APP_VERSION: "1.0.0"
  NEXT_PUBLIC_ENABLE_ANALYTICS: "true"
  NODE_ENV: "production"
