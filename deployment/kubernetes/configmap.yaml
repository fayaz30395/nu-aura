# Kubernetes ConfigMap for HRMS Platform
# This manifest defines non-sensitive configuration for the application

---
# Backend ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: hrms-backend-config
  namespace: hrms
  labels:
    app: hrms-backend
    tier: backend
data:
  # Spring Boot Configuration
  SPRING_PROFILES_ACTIVE: "prod"
  PORT: "8080"
  SERVER_ADDRESS: "0.0.0.0"

  # Database Configuration (non-sensitive parts)
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.postgresql.Driver"
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "20"
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "5"
  SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: "30000"
  SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: "600000"
  SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: "1800000"

  # JPA Configuration
  SPRING_JPA_HIBERNATE_DDL_AUTO: "none"
  SPRING_JPA_SHOW_SQL: "false"
  SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "false"
  SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: "public"
  SPRING_JPA_OPEN_IN_VIEW: "false"

  # Liquibase Configuration
  SPRING_LIQUIBASE_ENABLED: "true"
  SPRING_LIQUIBASE_CHANGE_LOG: "classpath:db/changelog/db.changelog-master.xml"
  SPRING_LIQUIBASE_DEFAULT_SCHEMA: "public"

  # Cache Configuration
  SPRING_CACHE_TYPE: "simple"

  # Multipart Configuration
  SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: "10MB"
  SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: "10MB"

  # Email Configuration (non-sensitive parts)
  MAIL_HOST: "smtp.gmail.com"
  MAIL_PORT: "587"
  MAIL_FROM: "noreply@hrms.example.com"
  MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
  MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
  MAIL_PROPERTIES_MAIL_SMTP_CONNECTION_TIMEOUT: "5000"
  MAIL_PROPERTIES_MAIL_SMTP_TIMEOUT: "3000"
  MAIL_PROPERTIES_MAIL_SMTP_WRITE_TIMEOUT: "5000"

  # Management/Actuator Configuration
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics,prometheus"
  MANAGEMENT_ENDPOINTS_WEB_BASE_PATH: "/actuator"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "when-authorized"
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
  MANAGEMENT_HEALTH_DB_ENABLED: "true"
  MANAGEMENT_HEALTH_REDIS_ENABLED: "false"

  # JWT Configuration (non-sensitive parts)
  JWT_EXPIRATION: "3600000"
  JWT_REFRESH_EXPIRATION: "86400000"

  # Tenant Configuration
  TENANT_RESOLUTION_STRATEGY: "header"
  TENANT_HEADER_NAME: "X-Tenant-ID"

  # Frontend URL
  FRONTEND_URL: "https://app.hrms.example.com"

  # AI Configuration (non-sensitive parts)
  OPENAI_BASE_URL: "https://api.openai.com/v1"
  OPENAI_MODEL: "gpt-4o-mini"

  # Swagger/OpenAPI Configuration
  SPRINGDOC_API_DOCS_PATH: "/api-docs"
  SPRINGDOC_SWAGGER_UI_PATH: "/swagger-ui.html"
  SPRINGDOC_SWAGGER_UI_TAGS_SORTER: "alpha"
  SPRINGDOC_SWAGGER_UI_OPERATIONS_SORTER: "alpha"
  SPRINGDOC_SHOW_ACTUATOR: "true"

  # Logging Configuration
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_COM_HRMS: "INFO"
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: "INFO"
  LOGGING_LEVEL_ORG_HIBERNATE_SQL: "INFO"

  # Java Options
  JAVA_OPTS: "-Xmx1536m -Xms512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"

  # Application name
  SPRING_APPLICATION_NAME: "hrms-platform"

---
# Frontend ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: hrms-frontend-config
  namespace: hrms
  labels:
    app: hrms-frontend
    tier: frontend
data:
  # Next.js Configuration
  NODE_ENV: "production"
  PORT: "3000"

  # API Configuration
  NEXT_PUBLIC_API_URL: "https://api.hrms.example.com"
  NEXT_PUBLIC_API_TIMEOUT: "30000"

  # Application Configuration
  NEXT_PUBLIC_APP_NAME: "HRMS Platform"
  NEXT_PUBLIC_APP_VERSION: "1.0.0"

  # Feature Flags
  NEXT_PUBLIC_ENABLE_ANALYTICS: "true"
  NEXT_PUBLIC_ENABLE_ERROR_TRACKING: "true"

  # Telemetry
  NEXT_TELEMETRY_DISABLED: "1"

---
# Database ConfigMap (for init scripts or migrations)
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-config
  namespace: hrms
  labels:
    app: postgres
data:
  init.sql: |
    -- Initialize database if needed
    CREATE SCHEMA IF NOT EXISTS public;

    -- Grant permissions
    GRANT ALL PRIVILEGES ON SCHEMA public TO hrms_user;

    -- Set default schema
    ALTER DATABASE hrms SET search_path TO public;

---
# Redis ConfigMap (if using Redis)
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: hrms
  labels:
    app: redis
data:
  redis.conf: |
    # Redis configuration for HRMS Platform
    maxmemory 256mb
    maxmemory-policy allkeys-lru

    # Persistence
    save 900 1
    save 300 10
    save 60 10000

    # Security
    protected-mode yes

    # Performance
    tcp-backlog 511
    timeout 0
    tcp-keepalive 300

    # Logging
    loglevel notice

    # Cluster mode disabled for single instance
    cluster-enabled no

---
# Monitoring ConfigMap (for Prometheus, etc.)
apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-config
  namespace: hrms
  labels:
    app: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s

    scrape_configs:
      - job_name: 'hrms-backend'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - hrms
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: hrms-backend
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

---
# Namespace configuration
apiVersion: v1
kind: Namespace
metadata:
  name: hrms
  labels:
    name: hrms
    environment: production
    app: hrms-platform

---
# Service Account for Backend
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hrms-backend-sa
  namespace: hrms
  labels:
    app: hrms-backend
  annotations:
    # GCP Workload Identity (if using)
    iam.gke.io/gcp-service-account: hrms-backend@YOUR_PROJECT_ID.iam.gserviceaccount.com

---
# Resource Quota for namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: hrms-resource-quota
  namespace: hrms
spec:
  hard:
    requests.cpu: "20"
    requests.memory: "40Gi"
    limits.cpu: "40"
    limits.memory: "80Gi"
    persistentvolumeclaims: "10"
    services.loadbalancers: "2"
    services.nodeports: "5"

---
# Limit Range for namespace
apiVersion: v1
kind: LimitRange
metadata:
  name: hrms-limit-range
  namespace: hrms
spec:
  limits:
    - max:
        cpu: "4"
        memory: "8Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "256Mi"
      type: Container
    - max:
        cpu: "10"
        memory: "20Gi"
      min:
        cpu: "100m"
        memory: "128Mi"
      type: Pod
