apiVersion: v1
kind: Service
metadata:
  name: hrms-backend
  namespace: hrms
  labels:
    app: hrms
    component: backend
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  selector:
    app: hrms
    component: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
