apiVersion: apps/v1
kind: Deployment
metadata:
  name: hrms-backend
  namespace: hrms
  labels:
    app: hrms
    component: backend
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: hrms
      component: backend
  template:
    metadata:
      labels:
        app: hrms
        component: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # Init container to wait for dependencies
      initContainers:
      - name: wait-for-db
        image: postgres:16-alpine
        command: ['sh', '-c', 'until pg_isready -h ${DB_HOST} -p ${DB_PORT} -U ${DB_USER}; do echo "Waiting for PostgreSQL..."; sleep 2; done;']
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: hrms-config
              key: DB_HOST
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: DB_USERNAME

      containers:
      - name: backend
        # IMAGE_TAG is replaced by CI/CD pipeline (e.g., git SHA or semver).
        # Do NOT deploy with :latest in production.
        image: gcr.io/PROJECT_ID/hrms-backend:IMAGE_TAG
        imagePullPolicy: IfNotPresent

        ports:
        - name: http
          containerPort: 8080
          protocol: TCP

        env:
        # ── Spring Profile ─────────────────────────────────────────────────────────
        - name: SPRING_PROFILES_ACTIVE
          valueFrom:
            configMapKeyRef:
              name: hrms-config
              key: SPRING_PROFILES_ACTIVE

        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: hrms-config
              key: SERVER_PORT

        # ── Database ───────────────────────────────────────────────────────────────
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: SPRING_DATASOURCE_URL

        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: SPRING_DATASOURCE_USERNAME

        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: SPRING_DATASOURCE_PASSWORD

        # ── Redis ──────────────────────────────────────────────────────────────────
        - name: SPRING_REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: SPRING_REDIS_HOST

        - name: SPRING_REDIS_PORT
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: SPRING_REDIS_PORT

        - name: SPRING_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: SPRING_REDIS_PASSWORD

        - name: SPRING_REDIS_SSL_ENABLED
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: SPRING_REDIS_SSL_ENABLED

        # ── JWT ────────────────────────────────────────────────────────────────────
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: JWT_SECRET

        - name: JWT_EXPIRATION
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: JWT_EXPIRATION

        - name: JWT_REFRESH_EXPIRATION
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: JWT_REFRESH_EXPIRATION

        # ── Encryption ─────────────────────────────────────────────────────────────
        - name: APP_SECURITY_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: APP_SECURITY_ENCRYPTION_KEY

        # ── MinIO ──────────────────────────────────────────────────────────────────
        - name: MINIO_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: MINIO_ENDPOINT

        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: MINIO_ACCESS_KEY

        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: MINIO_SECRET_KEY

        - name: MINIO_BUCKET
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: MINIO_BUCKET

        # ── Email ──────────────────────────────────────────────────────────────────
        - name: MAIL_HOST
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: MAIL_HOST

        - name: MAIL_PORT
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: MAIL_PORT

        - name: MAIL_USERNAME
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: MAIL_USERNAME

        - name: MAIL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: MAIL_PASSWORD

        - name: MAIL_FROM
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: MAIL_FROM

        # ── Google OAuth ───────────────────────────────────────────────────────────
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: GOOGLE_CLIENT_ID

        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: GOOGLE_CLIENT_SECRET

        # ── Cookie / Security ──────────────────────────────────────────────────────
        - name: COOKIE_SECURE
          valueFrom:
            configMapKeyRef:
              name: hrms-config
              key: COOKIE_SECURE

        - name: COOKIE_DOMAIN
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: COOKIE_DOMAIN

        - name: CSRF_ENABLED
          valueFrom:
            configMapKeyRef:
              name: hrms-config
              key: CSRF_ENABLED

        # ── Frontend / CORS ────────────────────────────────────────────────────────
        - name: FRONTEND_URL
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: FRONTEND_URL

        - name: AUTH_ALLOWED_DOMAIN
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: AUTH_ALLOWED_DOMAIN

        # ── Server error verbosity ─────────────────────────────────────────────────
        - name: SERVER_ERROR_INCLUDE_MESSAGE
          valueFrom:
            configMapKeyRef:
              name: hrms-config
              key: SERVER_ERROR_INCLUDE_MESSAGE

        - name: SERVER_ERROR_INCLUDE_BINDING
          valueFrom:
            configMapKeyRef:
              name: hrms-config
              key: SERVER_ERROR_INCLUDE_BINDING

        # ── Twilio SMS (optional) ──────────────────────────────────────────────────
        - name: TWILIO_MOCK_MODE
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: TWILIO_MOCK_MODE

        - name: TWILIO_ACCOUNT_SID
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: TWILIO_ACCOUNT_SID

        - name: TWILIO_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: TWILIO_AUTH_TOKEN

        - name: TWILIO_FROM_NUMBER
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: TWILIO_FROM_NUMBER

        # ── Calendar (optional) ────────────────────────────────────────────────────
        - name: CALENDAR_MOCK_MODE
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: CALENDAR_MOCK_MODE

        - name: GOOGLE_CALENDAR_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: GOOGLE_CALENDAR_CLIENT_ID

        - name: GOOGLE_CALENDAR_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: GOOGLE_CALENDAR_CLIENT_SECRET

        # ── OpenAI (optional) ──────────────────────────────────────────────────────
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: OPENAI_API_KEY

        # ── Slack (optional) ───────────────────────────────────────────────────────
        - name: SLACK_ENABLED
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: SLACK_ENABLED

        - name: SLACK_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: SLACK_WEBHOOK_URL

        - name: SLACK_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: hrms-secrets
              key: SLACK_BOT_TOKEN

        # ── JVM ────────────────────────────────────────────────────────────────────
        - name: JAVA_OPTS
          value: "-Xms512m -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication"

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30

        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: logs
          mountPath: /app/logs

      volumes:
      - name: tmp
        emptyDir: {}
      - name: logs
        emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: component
                  operator: In
                  values:
                  - backend
              topologyKey: kubernetes.io/hostname

      terminationGracePeriodSeconds: 30
