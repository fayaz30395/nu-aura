apiVersion: v1
kind: Service
metadata:
  name: hrms-elasticsearch
  namespace: hrms
  labels:
    app: hrms
    component: elasticsearch
spec:
  type: ClusterIP
  selector:
    app: hrms
    component: elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
      protocol: TCP
    - name: transport
      port: 9300
      targetPort: 9300
      protocol: TCP
